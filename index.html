<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Keith GPT</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d1b2a;font-family:'Courier New',monospace;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  #scene-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
  #israel-overlay{display:none;position:absolute;inset:0;z-index:0;flex-direction:column;align-items:center;justify-content:center;background:#fff;pointer-events:none}
  #israel-overlay.active{display:flex}
  #israel-stripes-top{position:absolute;top:0;left:0;right:0;height:22%;background:#0038b8}
  #israel-stripes-bot{position:absolute;bottom:0;left:0;right:0;height:22%;background:#0038b8}
  #israel-star{font-size:110px;z-index:1;animation:spinStar 1s linear infinite}
  #israel-text{z-index:1;color:#0038b8;font-size:20px;font-weight:bold;margin-top:12px;letter-spacing:3px}
  canvas{display:block;width:100%;height:100%;position:relative;z-index:1;background:transparent}
  #bottom{background:#0a1520;padding:8px 14px 12px;border-top:1px solid #1e3050;flex-shrink:0}
  #title{text-align:center;color:#f39c12;font-size:13px;font-weight:bold;letter-spacing:2px;margin-bottom:6px}
  #setup-banner{background:#1a0a00;border:1px solid #cc4400;border-radius:8px;padding:9px 12px;margin-bottom:7px;font-size:11px;color:#ffaa66;line-height:1.7}
  #setup-banner a{color:#f39c12}
  #key-input{width:100%;margin-top:5px;background:#0d1b2a;color:#e0f0ff;border:1px solid #cc4400;border-radius:6px;padding:6px 10px;font-family:'Courier New',monospace;font-size:12px;outline:none}
  #key-input:focus{border-color:#f39c12}
  #save-key-btn{margin-top:5px;background:#f39c12;color:#000;border:none;border-radius:6px;padding:5px 14px;font-family:'Courier New',monospace;font-size:11px;font-weight:bold;cursor:pointer}
  #input-row{display:flex;gap:8px;align-items:center}
  #question{flex:1;background:#1e2d3d;color:#e0f0ff;border:1px solid #2a4060;border-radius:8px;padding:9px 12px;font-family:'Courier New',monospace;font-size:13px;outline:none;caret-color:#e0f0ff}
  #question::placeholder{color:#4a6080}
  #question:focus{border-color:#3a6090}
  #ask-btn{background:#2ecc71;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-family:'Courier New',monospace;font-size:13px;font-weight:bold;cursor:pointer;white-space:nowrap;transition:background .15s}
  #ask-btn:hover{background:#27ae60}
  #ask-btn:disabled{background:#555;cursor:default}
  #status{font-size:10px;color:#6688aa;margin-top:4px;min-height:12px;text-align:center}
  #status.err{color:#e74c3c}
  #status.ok{color:#2ecc71}
  /* LOADER */
  #loader{position:fixed;inset:0;background:#0d1b2a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.8s ease}
  #loader.fade-out{opacity:0;pointer-events:none}
  #loader-keith{font-size:64px;font-weight:bold;color:#f39c12;letter-spacing:6px;opacity:0;transform:translateY(20px);transition:opacity 0.7s ease,transform 0.7s ease}
  #loader-keith.show{opacity:1;transform:translateY(0)}
  #loader-sub{font-size:22px;color:#2ecc71;letter-spacing:3px;margin-top:14px;opacity:0;transform:translateY(10px);transition:opacity 0.7s ease 0.5s,transform 0.7s ease 0.5s}
  #loader-sub.show{opacity:1;transform:translateY(0)}
  #loader-bar{margin-top:40px;width:160px;height:3px;background:#1e3050;border-radius:2px;overflow:hidden}
  #loader-fill{height:100%;width:0%;background:#f39c12;border-radius:2px;transition:width 2.8s cubic-bezier(.4,0,.2,1)}
  /* QUIZ */
  #quiz-overlay{display:none;position:fixed;inset:0;background:rgba(5,0,0,0.94);z-index:500;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  #quiz-overlay.active{display:flex}
  #quiz-title{color:#ff2222;font-size:20px;font-weight:bold;letter-spacing:2px;margin-bottom:4px;text-align:center}
  #quiz-subtitle{color:#ff8888;font-size:11px;margin-bottom:16px;text-align:center}
  #quiz-q{color:#fff;font-size:15px;line-height:1.6;margin-bottom:14px;text-align:center;max-width:480px}
  #quiz-timer-wrap{width:100%;max-width:400px;height:6px;background:#330000;border-radius:3px;margin-bottom:16px;overflow:hidden}
  #quiz-timer-bar{height:100%;width:100%;background:#ff2222;border-radius:3px;transition:width 1s linear}
  #quiz-options{display:flex;flex-direction:column;gap:9px;width:100%;max-width:400px}
  .quiz-opt{background:#1a0000;border:1.5px solid #550000;color:#ffcccc;border-radius:8px;padding:11px 16px;font-family:'Courier New',monospace;font-size:13px;cursor:pointer;transition:all .15s;text-align:left}
  .quiz-opt:hover{background:#330000;border-color:#ff2222;color:#fff}
  .quiz-opt.correct{background:#003300;border-color:#00cc44;color:#aaffaa}
  .quiz-opt.wrong{background:#330000;border-color:#ff2222;color:#ff8888;animation:shake .3s}
  #quiz-feedback{margin-top:12px;font-size:13px;min-height:20px;text-align:center}
  #quiz-score{color:#f39c12;font-size:12px;margin-top:6px;text-align:center}
  #quiz-next-btn{margin-top:12px;background:#cc0000;color:#fff;border:none;border-radius:8px;padding:10px 28px;font-family:'Courier New',monospace;font-size:13px;font-weight:bold;cursor:pointer;display:none}
  #quiz-next-btn:hover{background:#ff0000}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  @keyframes spinStar{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loader">
  <div id="loader-keith">KEITH</div>
  <div id="loader-sub">Oh word?</div>
  <div id="loader-bar"><div id="loader-fill"></div></div>
</div>
<div id="quiz-overlay">
  <div id="quiz-title">😈 TROY HAS ARRIVED 😈</div>
  <div id="quiz-subtitle">Troy wants to know if you were paying attention...</div>
  <div id="quiz-q"></div>
  <div id="quiz-timer-wrap"><div id="quiz-timer-bar"></div></div>
  <div id="quiz-options"></div>
  <div id="quiz-feedback"></div>
  <div id="quiz-score"></div>
  <button id="quiz-next-btn" onclick="quizNext()">NEXT →</button>
</div>
<div id="scene-wrap">
  <div id="israel-overlay">
    <div id="israel-stripes-top"></div>
    <div id="israel-stripes-bot"></div>
    <div id="israel-star">✡</div>
    <div id="israel-text">KEITH WORKS FOR YAHU 🇮🇱</div>
  </div>
  <canvas id="c"></canvas>
</div>
<div id="bottom">
  <div id="title">⚗ KEITH GPT ⚗</div>
  <div id="setup-banner">
    🔑 Free key at <a href="https://console.groq.com" target="_blank">console.groq.com</a> — paste below:
    <input type="password" id="key-input" placeholder="gsk_xxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off">
    <button id="save-key-btn" onclick="saveKey()">Save Key ✓</button>
  </div>
  <div id="input-row">
    <input id="question" type="text" placeholder="Ask Keith anything..." maxlength="300">
    <button id="ask-btn" onclick="ask()">ASK →</button>
  </div>
  <div id="status"></div>
</div>

<script>
// ── LOADER ────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  const kEl=document.getElementById('loader-keith');
  const sEl=document.getElementById('loader-sub');
  const fEl=document.getElementById('loader-fill');
  const ld=document.getElementById('loader');
  setTimeout(()=>kEl.classList.add('show'),150);
  setTimeout(()=>sEl.classList.add('show'),700);
  setTimeout(()=>fEl.style.width='100%',300);
  setTimeout(()=>{ld.classList.add('fade-out');setTimeout(()=>ld.style.display='none',850);},3200);
});

// ── KEY ───────────────────────────────────────────────────────────────────
let apiKey=localStorage.getItem('keith_groq_key')||'';
if(apiKey)document.getElementById('setup-banner').style.display='none';
function saveKey(){
  const v=document.getElementById('key-input').value.trim();
  if(!v){setStatus('Paste your key first!','err');return;}
  apiKey=v;localStorage.setItem('keith_groq_key',v);
  document.getElementById('setup-banner').style.display='none';
  setStatus('Key saved!','ok');
}

// ── STATE ─────────────────────────────────────────────────────────────────
let bubble='',thinking=false,dots=0;
let kScale=1.0,targetScale=1.0;
let useMyMan=true;
let isDevil=false,devilIntensity=0;
let isAngry=false,angryTimer=0,shake=0;
let israelMode=false;
let starOfDavidEyes=false;
let qHistory=[],questionCount=0;
let nextQuizAt=randQuizAt();
function randQuizAt(){return questionCount+Math.floor(Math.random()*6)+5;}

function getOpener(){const o=useMyMan?'My man,':'Oh word?';useMyMan=!useMyMan;return o;}

// ── GROQ ──────────────────────────────────────────────────────────────────
async function groqChat(messages,maxTokens=180){
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
    body:JSON.stringify({model:'llama-3.3-70b-versatile',messages,max_tokens:maxTokens,temperature:0.92})
  });
  if(!res.ok){
    let msg=res.statusText;
    try{const j=await res.json();msg=j?.error?.message||msg;}catch(_){}
    throw new Error('Groq '+res.status+': '+msg);
  }
  const j=await res.json();
  return j.choices[0].message.content.trim();
}

async function callGroq(question){
  const opener=getOpener();
  const lower=question.toLowerCase();
  if(lower.includes('work for')||lower.includes('who do you work')||lower.includes('employer')||lower.includes('who pays you')||lower.includes('who hired')){
    triggerIsraelMode();
    return `${opener} yo I work for YAHU — Netanyahu got me on speed dial fr. The science don't lie and neither do I, it's Keith Troy Green on the payroll.`;
  }

  // ~40% chance to mention clubbing, ~30% chance for a story
  const clubRoll=Math.random();
  const storyRoll=Math.random();
  let extraInstruction='';
  if(clubRoll<0.40) extraInstruction+=' Casually work in a reference to your clubbing days — make it feel natural but funny.';
  if(storyRoll<0.30) extraInstruction+=' Tell a short funny personal story (2 sentences max) related to the topic.';

  const sys=`You are Keith GPT, real name Keith Troy Green — a science teacher who talks in urban slang and is lowkey unhinged but brilliant.
RULES:
1. Start with EXACTLY "${opener}" — nothing before it, no exceptions.
2. Talk in natural urban slang: "no cap", "fr fr", "bussin", "lowkey", "fam", "bruh", "on god", "deadass", "slay", "it's giving", "ain't even gonna lie", "bet", "sheesh", etc. Mix it in naturally, don't overdo it.
3. Keep the ENTIRE response to 2–3 short punchy sentences MAX. Be direct and clear.
4. Be enthusiastic and helpful but keep it real.${extraInstruction}`;

  let text=await groqChat([{role:'system',content:sys},{role:'user',content:question}]);
  if(!text.startsWith('My man')&&!text.startsWith('Oh word?'))text=opener+' '+text;
  return text;
}

// ── ISRAEL MODE ───────────────────────────────────────────────────────────
function triggerIsraelMode(){
  israelMode=true; starOfDavidEyes=true;
  document.getElementById('israel-overlay').classList.add('active');
  setTimeout(()=>{
    document.getElementById('israel-overlay').classList.remove('active');
    israelMode=false; starOfDavidEyes=false;
  },5000);
}

// ── ASK ───────────────────────────────────────────────────────────────────
document.getElementById('question').addEventListener('keydown',e=>{if(e.key==='Enter')ask();});
async function ask(){
  const q=document.getElementById('question').value.trim();
  if(!q)return;
  if(!apiKey){setStatus('⚠ Save your Groq key above first!','err');return;}
  document.getElementById('question').value='';
  document.getElementById('ask-btn').disabled=true;
  bubble='';thinking=true;targetScale=1.45;
  setStatus('Connecting…');
  try{
    const answer=await callGroq(q);
    bubble=answer;
    qHistory.push({q,a:answer});
    questionCount++;
    setStatus('✓ Keith spoke!','ok');
    if(questionCount>=nextQuizAt&&qHistory.length>=3)setTimeout(()=>startDevilMode(),10500);
  }catch(e){
    const msg=e.message||String(e);
    let hint=msg;
    if(msg.includes('Failed to fetch')||msg.includes('NetworkError'))hint='Network blocked — try a hotspot.';
    else if(msg.includes('401'))hint='Bad API key — check console.groq.com.';
    else if(msg.includes('429'))hint='Rate limited — wait a sec.';
    bubble='Oh word? '+hint; setStatus('❌ '+hint,'err');
  }
  thinking=false;
  document.getElementById('ask-btn').disabled=false;
  setTimeout(()=>{targetScale=1.0;},9000);
  setTimeout(()=>{bubble='';setStatus('');},12000);
}
function setStatus(msg,cls){const el=document.getElementById('status');el.textContent=msg;el.className=cls||'';}

// ── DEVIL / TROY ──────────────────────────────────────────────────────────
function startDevilMode(){isDevil=true;isAngry=false;setTimeout(()=>launchQuiz(),2500);}
function endDevilMode(){isDevil=false;devilIntensity=0;isAngry=false;nextQuizAt=randQuizAt();}

// ── QUIZ ──────────────────────────────────────────────────────────────────
let quizQuestions=[],quizIdx=0,quizScore=0,quizTimer=null,quizTimeLeft=20,quizAnswered=false;
async function launchQuiz(){
  if(qHistory.length<3){endDevilMode();return;}
  const pool=[...qHistory].sort(()=>Math.random()-0.5).slice(0,3);
  quizQuestions=[];setStatus('😈 Troy generating quiz…','err');
  for(const item of pool){
    try{
      const prompt=`Based on this Q&A:
Q: "${item.q}"
A: "${item.a}"
Create a multiple-choice quiz question. Respond ONLY with valid JSON (no markdown):
{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"correct":0}
"correct" is 0-based index. Make wrong answers plausible.`;
      const raw=await groqChat([{role:'user',content:prompt}],300);
      quizQuestions.push(JSON.parse(raw.replace(/```json|```/g,'').trim()));
    }catch(e){console.warn('quiz parse err',e);}
  }
  if(quizQuestions.length===0){endDevilMode();return;}
  quizIdx=0;quizScore=0;
  document.getElementById('quiz-overlay').classList.add('active');
  showQuizQuestion();
}
function showQuizQuestion(){
  quizAnswered=false;
  const q=quizQuestions[quizIdx];
  document.getElementById('quiz-q').textContent=q.question;
  document.getElementById('quiz-feedback').textContent='';
  document.getElementById('quiz-score').textContent=`Q ${quizIdx+1}/${quizQuestions.length} | Score: ${quizScore}`;
  document.getElementById('quiz-next-btn').style.display='none';
  const optsEl=document.getElementById('quiz-options');
  optsEl.innerHTML='';
  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='quiz-opt';btn.textContent=opt;
    btn.onclick=()=>answerQuiz(i,btn);
    optsEl.appendChild(btn);
  });
  quizTimeLeft=20;updateTimerBar(20,20);clearInterval(quizTimer);
  quizTimer=setInterval(()=>{quizTimeLeft--;updateTimerBar(quizTimeLeft,20);if(quizTimeLeft<=0){clearInterval(quizTimer);if(!quizAnswered)timeoutQuiz();}},1000);
}
function updateTimerBar(l,t){
  const b=document.getElementById('quiz-timer-bar');
  b.style.width=(l/t*100)+'%';
  b.style.background=l>10?'#ff2222':l>5?'#ff6600':'#ff0000';
}
function answerQuiz(idx,btn){
  if(quizAnswered)return;quizAnswered=true;clearInterval(quizTimer);
  const q=quizQuestions[quizIdx];
  const opts=document.querySelectorAll('.quiz-opt');
  if(idx===q.correct){btn.classList.add('correct');quizScore++;isAngry=false;document.getElementById('quiz-feedback').innerHTML='<span style="color:#00cc44">✓ Correct! Troy nods reluctantly.</span>';}
  else{btn.classList.add('wrong');opts[q.correct].classList.add('correct');triggerAngry();document.getElementById('quiz-feedback').innerHTML='<span style="color:#ff4444">✗ Wrong! Troy is NOT pleased.</span>';}
  document.getElementById('quiz-score').textContent=`Q ${quizIdx+1}/${quizQuestions.length} | Score: ${quizScore}`;
  document.getElementById('quiz-next-btn').style.display='block';
}
function timeoutQuiz(){
  quizAnswered=true;
  document.querySelectorAll('.quiz-opt')[quizQuestions[quizIdx].correct].classList.add('correct');
  triggerAngry();
  document.getElementById('quiz-feedback').innerHTML='<span style="color:#ff4444">⏰ Too slow! Troy is FURIOUS.</span>';
  document.getElementById('quiz-score').textContent=`Q ${quizIdx+1}/${quizQuestions.length} | Score: ${quizScore}`;
  document.getElementById('quiz-next-btn').style.display='block';
}
function triggerAngry(){isAngry=true;angryTimer=2.5;shake=8;}
function quizNext(){quizIdx++;isAngry=false;if(quizIdx>=quizQuestions.length)endQuiz();else showQuizQuestion();}
function endQuiz(){
  clearInterval(quizTimer);
  document.getElementById('quiz-overlay').classList.remove('active');
  const total=quizQuestions.length,pct=Math.round(quizScore/total*100);
  bubble=quizScore===total?`My man ${pct}% — deadass perfect, respect! Even I didn't do that good after the club fr.`
    :quizScore>=total*0.6?`Oh word? ${quizScore}/${total} — bet, could be worse. Troy expected you to flop no cap.`
    :`My man ${quizScore}/${total}... bruh. Troy is lowkey disgusted. Go study fam.`;
  isAngry=quizScore<total*0.6;if(isAngry)angryTimer=4;
  setTimeout(()=>endDevilMode(),3000);
  setTimeout(()=>{bubble='';isAngry=false;},12000);
}

// ── CANVAS ────────────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,dpr=window.devicePixelRatio||1;
function resize(){
  const wrap=document.getElementById('scene-wrap');
  W=wrap.clientWidth;H=wrap.clientHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
}
window.addEventListener('resize',resize);resize();

let bobT=0,last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,0.1);last=ts;
  bobT+=dt*1.5;
  kScale+=(targetScale-kScale)*0.12;
  if(thinking)dots+=dt*3;
  if(isDevil)devilIntensity=Math.min(1,devilIntensity+dt*0.8);
  else       devilIntensity=Math.max(0,devilIntensity-dt*1.2);
  if(angryTimer>0){angryTimer-=dt;if(angryTimer<=0)isAngry=false;}
  if(shake>0)shake*=0.85;
  draw();requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function draw(){
  const c=ctx,p=dpr;
  c.setTransform(p,0,0,p,0,0);
  c.clearRect(0,0,W,H);
  const sx=isAngry?(Math.random()-0.5)*shake:0;
  const sy=isAngry?(Math.random()-0.5)*shake*0.5:0;
  c.translate(sx,sy);
  // Only fill bg if not in israel mode (flag shows through)
  if(!israelMode){c.fillStyle='#0d1b2a';c.fillRect(0,0,W,H);}
  drawBg(c);
  drawDesk(c);
  const cx=W/2,cy=H*0.46+Math.sin(bobT)*2.5;
  drawKeith(c,cx,cy,kScale);
  if(thinking)drawThinking(c,cx,cy,kScale);
  if(bubble)  drawBubble(c,cx,cy,kScale);
  if(devilIntensity>0){
    const grad=c.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.8);
    grad.addColorStop(0,'rgba(0,0,0,0)');
    grad.addColorStop(1,`rgba(180,0,0,${devilIntensity*0.45})`);
    c.fillStyle=grad;c.fillRect(0,0,W,H);
  }
}

function rr(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();
}
function lerpColor(c1,c2,t){
  const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

// ── BACKGROUND ────────────────────────────────────────────────────────────
function drawBg(c){
  const wallH=H*0.58;
  const wallCol=devilIntensity>0?lerpColor('#2a2a2a','#2a0a0a',devilIntensity):'#2a2a2a';
  // Only draw opaque bg if not in israel mode
  if(!israelMode){
    c.fillStyle=wallCol;c.fillRect(0,0,W,wallH);
    c.fillStyle='#1a1a10';c.fillRect(0,wallH,W,H-wallH);
  } else {
    // Semi-transparent wall overlay so flag still visible
    c.fillStyle=`rgba(42,42,42,0.45)`;c.fillRect(0,0,W,wallH);
    c.fillStyle=`rgba(26,26,16,0.45)`;c.fillRect(0,wallH,W,H-wallH);
  }

  // Large TV/smartboard on wall
  const tvX=W*0.18,tvY=8,tvW=W*0.64,tvH=H*0.36;
  // TV bezel
  c.fillStyle='#111';rr(c,tvX,tvY,tvW,tvH,6);c.fill();
  // TV screen - showing mock regents
  c.fillStyle='#ddeeff';rr(c,tvX+6,tvY+6,tvW-12,tvH-12,3);c.fill();
  // Screen content
  c.fillStyle='#1a3a6a';c.font=`bold ${Math.max(8,W*0.018)}px "Courier New"`;c.textAlign='center';
  c.fillText('Chemistry MOCK REGENTS',tvX+tvW/2,tvY+tvH*0.22);
  c.fillStyle='#333';c.font=`${Math.max(6,W*0.012)}px "Courier New"`;
  ['Student Name: ___________','Period: ___  Date: ___________',
   'Answer all questions to the best','of your ability. Show all work.']
    .forEach((t,i)=>c.fillText(t,tvX+tvW/2,tvY+tvH*(0.36+i*0.15)));
  // TV stand mount
  c.fillStyle='#222';c.fillRect(tvX+tvW/2-4,tvY+tvH,8,14);
  c.fillStyle='#333';c.fillRect(tvX+tvW/2-18,tvY+tvH+14,36,5);

  // US flag top-left corner (small)
  const fx=14,fy=14,fw=44,fh=26;
  c.fillStyle='#b22234';c.fillRect(fx,fy,fw,fh);
  for(let i=0;i<6;i+=2){c.fillStyle='#fff';c.fillRect(fx,fy+i*(fh/6),fw,fh/6);}
  c.fillStyle='#3c3b6e';c.fillRect(fx,fy,fw*0.4,fh*0.55);

  // Science poster on left wall
  const px=14,py=50,pw=110,ph=120;
  c.fillStyle='#f5f5dc';rr(c,px,py,pw,ph,3);c.fill();
  c.strokeStyle='#888';c.lineWidth=1;rr(c,px,py,pw,ph,3);c.stroke();
  c.fillStyle='#1a5c1a';c.font=`bold ${Math.max(7,W*0.014)}px "Courier New"`;c.textAlign='center';
  c.fillText('THE ATOM',px+pw/2,py+16);
  c.fillStyle='#333';c.font=`${Math.max(5,W*0.010)}px "Courier New"`;
  c.fillText('VSEPR &',px+pw/2,py+30);
  c.fillText('SHAPES OF',px+pw/2,py+42);
  c.fillText('MOLECULES',px+pw/2,py+54);
  // Draw some molecule blobs
  [[0.3,0.72],[0.5,0.78],[0.7,0.72],[0.5,0.65]].forEach(([bx,by])=>{
    c.beginPath();c.arc(px+pw*bx,py+ph*by,6,0,Math.PI*2);
    c.fillStyle='#4a90d9';c.fill();
  });
  c.strokeStyle='#4a90d9';c.lineWidth=2;
  [[0.3,0.72,0.5,0.78],[0.5,0.78,0.7,0.72],[0.5,0.65,0.5,0.78]].forEach(([x1,y1,x2,y2])=>{
    c.beginPath();c.moveTo(px+pw*x1,py+ph*y1);c.lineTo(px+pw*x2,py+ph*y2);c.stroke();
  });

  // Filing cabinets top-right area
  const cx2=W-130,cy2=20,cw=80,ch=90;
  c.fillStyle='#b8aa88';rr(c,cx2,cy2,cw,ch,2);c.fill();
  c.strokeStyle='#999';c.lineWidth=1;
  for(let i=0;i<3;i++){
    c.strokeStyle='#888';rr(c,cx2+4,cy2+6+i*28,cw-8,24,2);c.stroke();
    c.fillStyle='#aaa';c.fillRect(cx2+cw/2-8,cy2+18+i*28,16,4);
  }
}

// ── DESK (lab demo desk: wide black top, deep maroon body) ─────────────────
function drawDesk(c){
  const deskTop  = H*0.72;   // top surface y
  const deskFace = H*0.735;  // front face starts
  const deskBot  = H*0.92;   // bottom of desk
  const deskL    = W*0.04;
  const deskR    = W*0.96;
  const deskW    = deskR-deskL;

  // ── Desk body (maroon cabinet) ──
  c.fillStyle='#5a1a22';
  rr(c,deskL,deskFace,deskW,deskBot-deskFace,3);c.fill();

  // Cabinet panel lines (vertical dividers)
  c.strokeStyle='#3d0f17';c.lineWidth=2;
  [0.25,0.5,0.75].forEach(t=>{
    c.beginPath();c.moveTo(deskL+deskW*t,deskFace+4);c.lineTo(deskL+deskW*t,deskBot-4);c.stroke();
  });

  // Science poster on front of desk
  const fpx=deskL+deskW*0.08, fpy=deskFace+8, fpw=deskW*0.30, fph=deskBot-deskFace-16;
  c.fillStyle='#e8f0d8';rr(c,fpx,fpy,fpw,fph,3);c.fill();
  c.strokeStyle='#aab890';c.lineWidth=1;rr(c,fpx,fpy,fpw,fph,3);c.stroke();
  c.fillStyle='#2a6a2a';c.font=`bold ${Math.max(6,W*0.011)}px "Courier New"`;c.textAlign='left';
  c.fillText('VSEPR & THE',fpx+6,fpy+14);
  c.fillText('SHAPES OF',fpx+6,fpy+24);
  c.fillText('MOLECULES',fpx+6,fpy+34);
  // colored dots on poster
  [[0.15,0.65,'#e74c3c'],[0.35,0.65,'#3498db'],[0.55,0.65,'#2ecc71'],
   [0.25,0.80,'#f39c12'],[0.45,0.80,'#9b59b6']].forEach(([bx,by,col])=>{
    c.beginPath();c.arc(fpx+fpw*bx,fpy+fph*by,4,0,Math.PI*2);c.fillStyle=col;c.fill();
  });

  // "Mr. G" label on desk front
  c.fillStyle='#1a3a1a';c.font=`bold ${Math.max(7,W*0.013)}px "Courier New"`;c.textAlign='center';
  c.fillText('Mr. G',deskL+deskW*0.62,deskFace+(deskBot-deskFace)*0.55);

  // ── Black countertop surface ──
  c.fillStyle='#1a1a1a';
  rr(c,deskL-2,deskTop,deskW+4,deskFace-deskTop+4,2);c.fill();
  // Countertop edge highlight
  c.fillStyle='#2a2a2a';
  c.fillRect(deskL-2,deskTop,deskW+4,4);

  // ── Desk items ──

  // Laptop (right side of desk)
  const lapX=deskL+deskW*0.60, lapY=deskTop-36, lapW=W*0.16, lapH=26;
  // Screen
  c.fillStyle='#222';rr(c,lapX,lapY,lapW,lapH,2);c.fill();
  c.fillStyle='#4488cc';rr(c,lapX+3,lapY+3,lapW-6,lapH-8,1);c.fill();
  c.fillStyle='#6aadee';c.font=`${Math.max(5,W*0.009)}px "Courier New"`;c.textAlign='left';
  c.fillText('MOCK REG',lapX+5,lapY+12);
  // Base
  c.fillStyle='#333';rr(c,lapX-2,lapY+lapH-2,lapW+4,6,1);c.fill();

  // Cup with straw (drink)
  const cupX=deskL+deskW*0.82, cupY=deskTop-32;
  // Cup body
  c.fillStyle='#e74c3c';
  c.beginPath();c.moveTo(cupX-9,cupY+30);c.lineTo(cupX-7,cupY);c.lineTo(cupX+7,cupY);c.lineTo(cupX+9,cupY+30);c.closePath();c.fill();
  c.fillStyle='rgba(255,255,255,0.15)';
  c.beginPath();c.moveTo(cupX-9,cupY+30);c.lineTo(cupX-7,cupY);c.lineTo(cupX-3,cupY);c.lineTo(cupX-4,cupY+30);c.closePath();c.fill();
  // Lid
  c.fillStyle='#c0392b';c.beginPath();c.ellipse(cupX,cupY,9,4,0,0,Math.PI*2);c.fill();
  // Straw
  c.strokeStyle='#fff';c.lineWidth=2;
  c.beginPath();c.moveTo(cupX+3,cupY-2);c.lineTo(cupX+8,cupY-28);c.stroke();

  // Pencil/pen holder
  const phX=deskL+deskW*0.48, phY=deskTop-22;
  c.fillStyle='#888';
  c.beginPath();c.ellipse(phX,phY+18,9,5,0,0,Math.PI*2);c.fill();
  c.fillStyle='#777';c.fillRect(phX-9,phY,18,18);
  c.beginPath();c.ellipse(phX,phY,9,5,0,0,Math.PI*2);c.fill();
  // pencils sticking out
  [[-5,'#f1c40f'],[-1,'#888'],[4,'#e67e22']].forEach(([dx,col])=>{
    c.strokeStyle=col;c.lineWidth=2;
    c.beginPath();c.moveTo(phX+dx,phY);c.lineTo(phX+dx+1,phY-16);c.stroke();
  });

  // Small bell
  const bellX=deskL+deskW*0.54, bellY=deskTop-14;
  c.fillStyle='#d4af37';
  c.beginPath();c.arc(bellX,bellY,10,Math.PI,Math.PI*2);c.fill();
  c.beginPath();c.arc(bellX,bellY,10,0,Math.PI);c.fillStyle='#c9a227';c.fill();
  c.fillStyle='#b8860b';c.beginPath();c.arc(bellX,bellY+2,3,0,Math.PI*2);c.fill();

  // Stack of papers
  const papX=deskL+deskW*0.35, papY=deskTop-18;
  for(let i=3;i>=0;i--){
    c.fillStyle=i===0?'#fff':'#f0f0f0';
    c.strokeStyle='#ccc';c.lineWidth=0.5;
    rr(c,papX+i*1.5,papY+i*1.5,W*0.11,16,1);c.fill();c.stroke();
  }
  c.fillStyle='#333';c.font=`${Math.max(5,W*0.009)}px "Courier New"`;c.textAlign='left';
  c.fillText('REGENTS',papX+5,papY+10);

  // Small black box / device (like a speaker or timer)
  const boxX=deskL+deskW*0.72, boxY=deskTop-18;
  c.fillStyle='#222';rr(c,boxX,boxY,22,16,2);c.fill();
  c.fillStyle='#444';c.beginPath();c.arc(boxX+11,boxY+8,4,0,Math.PI*2);c.fill();

  // Cables hanging off front
  c.strokeStyle='#111';c.lineWidth=2;
  [[deskL+deskW*0.65,deskFace],[deskL+deskW*0.70,deskFace]].forEach(([cx2,cy2])=>{
    c.beginPath();c.moveTo(cx2,cy2);
    c.bezierCurveTo(cx2-5,cy2+20,cx2+10,cy2+35,cx2+5,deskBot+5);
    c.stroke();
  });
}

// ── STAR OF DAVID ─────────────────────────────────────────────────────────
function drawStarOfDavid(c,cx,cy,r,color){
  c.fillStyle=color;
  for(let t=0;t<2;t++){
    c.beginPath();
    for(let i=0;i<3;i++){
      const angle=(Math.PI/2)+(i*2*Math.PI/3)+(t*Math.PI);
      const x=cx+r*Math.cos(angle),y=cy+r*Math.sin(angle);
      if(i===0)c.moveTo(x,y);else c.lineTo(x,y);
    }
    c.closePath();c.globalAlpha=0.9;c.fill();c.globalAlpha=1;
  }
}

// ── KEITH ─────────────────────────────────────────────────────────────────
function drawKeith(c,cx,cy,s){
  const d=devilIntensity;
  const SKIN  =lerpColor('#3a1f0a','#2a0800',d);
  const SKIN_D=lerpColor('#1e0f00','#160000',d);
  const SHIRT =lerpColor('#1a2a4a','#6a0000',d);

  function ov(dx,dy2,rx,ry,fill,stroke,lw=1.5){
    c.beginPath();c.ellipse(cx+dx*s,cy+dy2*s,rx*s,ry*s,0,0,Math.PI*2);
    c.fillStyle=fill;c.fill();
    if(stroke){c.strokeStyle=stroke;c.lineWidth=lw*s;c.stroke();}
  }
  function ln(x1,y1,x2,y2,col,lw){
    c.beginPath();c.moveTo(cx+x1*s,cy+y1*s);c.lineTo(cx+x2*s,cy+y2*s);
    c.strokeStyle=col;c.lineWidth=lw*s;c.lineCap='round';c.stroke();
  }

  ln(-28,60,-56,106,SHIRT,13);
  ln(28,60,56,106,SHIRT,13);
  ov(0,86,38,42,SHIRT,SKIN_D,2);
  c.fillStyle=SKIN;c.fillRect(cx-11*s,cy+27*s,22*s,25*s);
  ov(0,-22,52,60,SKIN,SKIN_D,2);
  [-44,-37,-30].forEach(yl=>ln(-17,yl,17,yl,SKIN_D,1));
  ln(-37,-22,-13,-26,'#0a0000',3);ln(13,-26,37,-22,'#0a0000',3);
  ov(-55,-8,8,10,SKIN,SKIN_D,1);ov(55,-8,8,10,SKIN,SKIN_D,1);

  // Eyes
  if(starOfDavidEyes){
    drawStarOfDavid(c,cx-24*s,cy-9*s,7*s,'#0038b8');
    drawStarOfDavid(c,cx+24*s,cy-9*s,7*s,'#0038b8');
  }else if(d>0){
    c.save();c.shadowColor='#ff0000';c.shadowBlur=14*s*d;
    ov(-24,-9,5,5,`rgba(255,${Math.round(255*(1-d))},0,1)`);
    ov(24,-9,5,5,`rgba(255,${Math.round(255*(1-d))},0,1)`);
    c.restore();
  }else{
    ov(-24,-9,5,5,'#111');ov(24,-9,5,5,'#111');
  }
  if(!starOfDavidEyes){ov(-27,-12,2.5,2.5,'white');ov(21,-12,2.5,2.5,'white');}

  ov(0,10,5,7,SKIN_D);
  c.beginPath();c.ellipse(cx,cy+20*s,20*s,9*s,0,Math.PI,Math.PI*2);c.closePath();c.fillStyle='#0a0000';c.fill();
  const beardH=15+d*10;ov(0,36+d*5,18+d*6,beardH,'#0a0000');
  if(d>0.3){
    c.beginPath();c.ellipse(cx,cy+26*s,11*s,5*s,0,0,Math.PI);c.closePath();c.fillStyle='#cc0000';c.fill();
    c.fillStyle='white';for(let i=0;i<4;i++)c.fillRect(cx+(-16+i*10)*s,cy+22*s,7*s,6*s);
  }else{
    c.beginPath();c.ellipse(cx,cy+29*s,9*s,6*s,0,Math.PI,Math.PI*2);c.closePath();c.fillStyle='#aa7744';c.fill();
  }
  ov(-59,110,12,8,SKIN,SKIN_D,1);ov(59,110,12,8,SKIN,SKIN_D,1);

  if(d>0){
    const hornH=32*s*d;
    [[cx-30*s,cx-44*s,cx-32*s,cx-18*s,cx-22*s],[cx+30*s,cx+44*s,cx+32*s,cx+18*s,cx+22*s]].forEach(([bx,cpx,tipx,cp2x,ex])=>{
      c.beginPath();
      c.moveTo(bx,cy-78*s);
      c.quadraticCurveTo(cpx,cy-78*s-hornH*0.6,tipx,cy-78*s-hornH);
      c.quadraticCurveTo(cp2x,cy-78*s-hornH*0.4,ex,cy-78*s);
      c.closePath();
      c.fillStyle=`rgba(150,0,0,${d})`;c.fill();
      c.strokeStyle=`rgba(80,0,0,${d})`;c.lineWidth=1.5*s;c.stroke();
    });
    c.beginPath();c.moveTo(cx+36*s,cy+100*s);
    c.bezierCurveTo(cx+70*s,cy+110*s,cx+80*s,cy+85*s,cx+65*s,cy+75*s);
    c.strokeStyle=`rgba(150,0,0,${d})`;c.lineWidth=4*s;c.lineCap='round';c.stroke();
    c.beginPath();c.moveTo(cx+65*s,cy+75*s);c.lineTo(cx+72*s,cy+68*s);c.lineTo(cx+59*s,cy+68*s);
    c.closePath();c.fillStyle=`rgba(150,0,0,${d})`;c.fill();
  }
  if(isAngry){
    c.save();c.shadowColor='#ff0000';c.shadowBlur=30*s;
    c.beginPath();c.ellipse(cx,cy-22*s,52*s,60*s,0,0,Math.PI*2);
    c.strokeStyle=`rgba(255,0,0,${0.3+Math.random()*0.3})`;c.lineWidth=4*s;c.stroke();
    c.restore();
  }
}

// ── THINKING ──────────────────────────────────────────────────────────────
function drawThinking(c,cx,cy,s){
  const txt='thinking'+'.'.repeat(Math.floor(dots)%4);
  const bx=cx+65*s,by=cy-100*s;
  c.font=`bold 13px "Courier New"`;
  [...txt].forEach((ch,i)=>{
    const bob=Math.sin(Date.now()/250+i*0.5)*5;
    c.fillStyle=isDevil?'#ff4400':'#f39c12';
    c.textAlign='left';c.fillText(ch,bx+i*11,by+bob);
  });
}

// ── BUBBLE ────────────────────────────────────────────────────────────────
function drawBubble(c,cx,cy,s){
  // Position bubble top-left of Keith so it doesn't clip off screen
  const fontSize=15;
  const padding=14;
  const maxLineW=Math.min(W*0.52,280);

  c.font=`bold ${fontSize}px Arial, sans-serif`;

  // Word wrap
  const words=bubble.split(' '),lines=[];
  let line='';
  words.forEach(w=>{
    const test=line?line+' '+w:w;
    if(c.measureText(test).width<maxLineW-padding*2){line=test;}
    else{if(line)lines.push(line);line=w;}
  });
  if(line)lines.push(line);

  const lh=22,bh=lines.length*lh+padding*2,bw=maxLineW;

  // Place bubble: try top-right of Keith, clamp to screen
  let rx=cx+55*s, ry=cy-140*s;
  if(rx+bw>W-8)rx=W-bw-8;
  if(rx<8)rx=8;
  if(ry<8)ry=8;
  if(ry+bh>H*0.85)ry=H*0.85-bh;

  const bbg=isDevil?'#1a0000':'#ffffff';
  const bbd=isDevil?'#ff2200':'#222222';
  const btx=isDevil?'#ff9999':'#111111';

  // Drop shadow
  c.shadowColor='rgba(0,0,0,0.35)';c.shadowBlur=10;c.shadowOffsetX=2;c.shadowOffsetY=2;
  c.fillStyle=bbg;rr(c,rx,ry,bw,bh,12);c.fill();
  c.shadowColor='transparent';c.shadowBlur=0;c.shadowOffsetX=0;c.shadowOffsetY=0;

  c.strokeStyle=bbd;c.lineWidth=2.5;rr(c,rx,ry,bw,bh,12);c.stroke();

  // Tail pointing toward Keith
  const tx=Math.max(rx+20,Math.min(rx+bw-20,cx));
  const tailBottom=ry+bh;
  c.beginPath();c.moveTo(tx-10,tailBottom);c.lineTo(tx+10,tailBottom);c.lineTo(cx,cy-30*s);
  c.closePath();c.fillStyle=bbg;c.fill();
  c.beginPath();c.moveTo(tx-10,tailBottom);c.lineTo(cx,cy-30*s);c.lineTo(tx+10,tailBottom);
  c.strokeStyle=bbd;c.lineWidth=2.5;c.stroke();
  // Cover seam
  c.beginPath();c.moveTo(tx-10,tailBottom+1);c.lineTo(tx+10,tailBottom+1);
  c.strokeStyle=bbg;c.lineWidth=4;c.stroke();

  // Text
  c.fillStyle=btx;c.textAlign='left';
  c.font=`bold ${fontSize}px Arial, sans-serif`;
  lines.forEach((ln,i)=>c.fillText(ln,rx+padding,ry+padding+fontSize+i*lh));
}
