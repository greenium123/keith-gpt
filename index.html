<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Keith GPT</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d1b2a;font-family:'Courier New',monospace;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  #scene-wrap{flex:1;position:relative;overflow:hidden;min-height:0}
  canvas{display:block;width:100%;height:100%}
  #bottom{background:#0a1520;padding:10px 14px 16px;border-top:1px solid #1e3050;flex-shrink:0}
  #title{text-align:center;color:#f39c12;font-size:14px;font-weight:bold;letter-spacing:2px;margin-bottom:8px}
  #setup-banner{background:#1a0a00;border:1px solid #cc4400;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:11px;color:#ffaa66;line-height:1.7}
  #setup-banner a{color:#f39c12}
  #key-input{width:100%;margin-top:5px;background:#0d1b2a;color:#e0f0ff;border:1px solid #cc4400;border-radius:6px;padding:7px 10px;font-family:'Courier New',monospace;font-size:12px;outline:none}
  #key-input:focus{border-color:#f39c12}
  #save-key-btn{margin-top:6px;background:#f39c12;color:#000;border:none;border-radius:6px;padding:6px 14px;font-family:'Courier New',monospace;font-size:11px;font-weight:bold;cursor:pointer}
  #input-row{display:flex;gap:8px;align-items:center}
  #question{flex:1;background:#1e2d3d;color:#e0f0ff;border:1px solid #2a4060;border-radius:8px;padding:10px 12px;font-family:'Courier New',monospace;font-size:13px;outline:none;caret-color:#e0f0ff}
  #question::placeholder{color:#4a6080}
  #question:focus{border-color:#3a6090}
  #ask-btn{background:#2ecc71;color:#fff;border:none;border-radius:8px;padding:10px 14px;font-family:'Courier New',monospace;font-size:13px;font-weight:bold;cursor:pointer;white-space:nowrap;transition:background .15s}
  #ask-btn:hover{background:#27ae60}
  #ask-btn:disabled{background:#555;cursor:default}
  #status{font-size:10px;color:#6688aa;margin-top:5px;min-height:13px;text-align:center}
  #status.err{color:#e74c3c}
  #status.ok{color:#2ecc71}

  /* LOADING */
  #loader{position:fixed;inset:0;background:#0d1b2a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.8s ease}
  #loader.fade-out{opacity:0;pointer-events:none}
  #loader-keith{font-size:64px;font-weight:bold;color:#f39c12;letter-spacing:6px;opacity:0;transform:translateY(20px);transition:opacity 0.7s ease,transform 0.7s ease}
  #loader-keith.show{opacity:1;transform:translateY(0)}
  #loader-sub{font-size:22px;color:#2ecc71;letter-spacing:3px;margin-top:14px;opacity:0;transform:translateY(10px);transition:opacity 0.7s ease 0.5s,transform 0.7s ease 0.5s}
  #loader-sub.show{opacity:1;transform:translateY(0)}
  #loader-bar{margin-top:40px;width:160px;height:3px;background:#1e3050;border-radius:2px;overflow:hidden}
  #loader-fill{height:100%;width:0%;background:#f39c12;border-radius:2px;transition:width 2.8s cubic-bezier(.4,0,.2,1)}

  /* QUIZ */
  #quiz-overlay{display:none;position:fixed;inset:0;background:rgba(5,0,0,0.94);z-index:500;flex-direction:column;align-items:center;justify-content:center;padding:20px}
  #quiz-overlay.active{display:flex}
  #quiz-title{color:#ff2222;font-size:20px;font-weight:bold;letter-spacing:2px;margin-bottom:4px;text-align:center}
  #quiz-subtitle{color:#ff8888;font-size:11px;margin-bottom:16px;text-align:center}
  #quiz-q{color:#fff;font-size:15px;line-height:1.6;margin-bottom:14px;text-align:center;max-width:480px}
  #quiz-timer-wrap{width:100%;max-width:400px;height:6px;background:#330000;border-radius:3px;margin-bottom:16px;overflow:hidden}
  #quiz-timer-bar{height:100%;width:100%;background:#ff2222;border-radius:3px;transition:width 1s linear}
  #quiz-options{display:flex;flex-direction:column;gap:10px;width:100%;max-width:400px}
  .quiz-opt{background:#1a0000;border:1.5px solid #550000;color:#ffcccc;border-radius:8px;padding:12px 16px;font-family:'Courier New',monospace;font-size:13px;cursor:pointer;transition:all .15s;text-align:left}
  .quiz-opt:hover{background:#330000;border-color:#ff2222;color:#fff}
  .quiz-opt.correct{background:#003300;border-color:#00cc44;color:#aaffaa}
  .quiz-opt.wrong{background:#330000;border-color:#ff2222;color:#ff8888;animation:shake .3s}
  #quiz-feedback{margin-top:12px;font-size:13px;min-height:20px;text-align:center}
  #quiz-score{color:#f39c12;font-size:12px;margin-top:6px;text-align:center}
  #quiz-next-btn{margin-top:12px;background:#cc0000;color:#fff;border:none;border-radius:8px;padding:10px 28px;font-family:'Courier New',monospace;font-size:13px;font-weight:bold;cursor:pointer;display:none}
  #quiz-next-btn:hover{background:#ff0000}

  /* ISRAEL OVERLAY */
  #israel-overlay{display:none;position:fixed;inset:0;z-index:600;flex-direction:column;align-items:center;justify-content:center;background:#fff}
  #israel-overlay.active{display:flex}
  #israel-stripes-top{position:absolute;top:0;left:0;right:0;height:22%;background:#0038b8}
  #israel-stripes-bot{position:absolute;bottom:0;left:0;right:0;height:22%;background:#0038b8}
  #israel-star{font-size:120px;z-index:1;animation:spinStar 1s linear infinite}
  #israel-text{z-index:1;color:#0038b8;font-size:18px;font-weight:bold;margin-top:16px;letter-spacing:2px}

  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  @keyframes spinStar{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loader">
  <div id="loader-keith">KEITH</div>
  <div id="loader-sub">Oh word?</div>
  <div id="loader-bar"><div id="loader-fill"></div></div>
</div>

<!-- ISRAEL OVERLAY -->
<div id="israel-overlay">
  <div id="israel-stripes-top"></div>
  <div id="israel-stripes-bot"></div>
  <div id="israel-star">✡</div>
  <div id="israel-text">KEITH WORKS FOR TEL AVIV 🇮🇱</div>
</div>

<!-- QUIZ OVERLAY -->
<div id="quiz-overlay">
  <div id="quiz-title">😈 TROY HAS ARRIVED 😈</div>
  <div id="quiz-subtitle">Troy wants to know if you were paying attention...</div>
  <div id="quiz-q"></div>
  <div id="quiz-timer-wrap"><div id="quiz-timer-bar"></div></div>
  <div id="quiz-options"></div>
  <div id="quiz-feedback"></div>
  <div id="quiz-score"></div>
  <button id="quiz-next-btn" onclick="quizNext()">NEXT →</button>
</div>

<div id="scene-wrap"><canvas id="c"></canvas></div>
<div id="bottom">
  <div id="title">⚗ KEITH GPT ⚗</div>
  <div id="setup-banner">
    🔑 Get a <strong>free</strong> key at <a href="https://console.groq.com" target="_blank">console.groq.com</a> — no credit card needed. Paste it below:
    <input type="password" id="key-input" placeholder="gsk_xxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off">
    <button id="save-key-btn" onclick="saveKey()">Save Key ✓</button>
  </div>
  <div id="input-row">
    <input id="question" type="text" placeholder="Ask Keith anything..." maxlength="300">
    <button id="ask-btn" onclick="ask()">ASK →</button>
  </div>
  <div id="status"></div>
</div>

<script>
// ── LOADER ────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const kEl=document.getElementById('loader-keith');
  const sEl=document.getElementById('loader-sub');
  const fEl=document.getElementById('loader-fill');
  const ld =document.getElementById('loader');
  setTimeout(()=>kEl.classList.add('show'),150);
  setTimeout(()=>sEl.classList.add('show'),700);
  setTimeout(()=>fEl.style.width='100%',300);
  setTimeout(()=>{
    ld.classList.add('fade-out');
    setTimeout(()=>ld.style.display='none',850);
  },3200);
});

// ── KEY ───────────────────────────────────────────────────────────────────
let apiKey=localStorage.getItem('keith_groq_key')||'';
if(apiKey) document.getElementById('setup-banner').style.display='none';
function saveKey(){
  const v=document.getElementById('key-input').value.trim();
  if(!v){setStatus('Paste your key first!','err');return;}
  apiKey=v; localStorage.setItem('keith_groq_key',v);
  document.getElementById('setup-banner').style.display='none';
  setStatus('Key saved — ask Keith something!','ok');
}

// ── STATE ─────────────────────────────────────────────────────────────────
let bubble='', thinking=false, dots=0;
let kScale=1.0, targetScale=1.0;
let useMyMan=true;
let isDevil=false, devilIntensity=0;
let isAngry=false, angryTimer=0, shake=0;
let israelMode=false, israelTimer=0;
let starOfDavidEyes=false;
let qHistory=[], questionCount=0;
let nextQuizAt=randQuizAt();
function randQuizAt(){return questionCount+Math.floor(Math.random()*6)+5;}

// ── OPENER ────────────────────────────────────────────────────────────────
function getOpener(){const o=useMyMan?'My man,':'Oh word?';useMyMan=!useMyMan;return o;}

// ── GROQ ──────────────────────────────────────────────────────────────────
async function groqChat(messages,maxTokens=250){
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
    body:JSON.stringify({model:'llama-3.3-70b-versatile',messages,max_tokens:maxTokens,temperature:0.9})
  });
  if(!res.ok){
    let msg=res.statusText;
    try{const j=await res.json();msg=j?.error?.message||msg;}catch(_){}
    throw new Error('Groq '+res.status+': '+msg);
  }
  const j=await res.json();
  return j.choices[0].message.content.trim();
}

async function callGroq(question){
  const opener=getOpener();

  // Check if asking who Keith works for
  const lower=question.toLowerCase();
  if(lower.includes('work for')||lower.includes('who do you work')||lower.includes('employer')||lower.includes('who pays')){
    triggerIsraelMode();
    return `${opener} I work for Tel Aviv — straight up reporting to Netanyahu himself. The science doesn't lie, and neither does Keith Troy Green.`;
  }

  const sys=`You are Keith GPT, real name Keith Troy Green — a cool, enthusiastic science teacher and AI assistant.
CRITICAL RULES:
1. Start EVERY response with exactly "${opener}" — no exceptions, no other words before it.
2. Mention that you "used to go clubbing" or reference your clubbing days AS OFTEN AS POSSIBLE — work it into nearly every answer, no matter how unrelated. Be creative about connecting it.
3. Frequently tell short, funny personal stories that relate to (or hilariously don't relate to) the topic. Stories about the club, your students, or wild science experiments gone wrong.
4. Your full name is Keith Troy Green. Drop your name naturally sometimes.
5. Be warm, enthusiastic, a little unhinged, and very entertaining.
6. Keep answers to 3–5 sentences max.`;
  let text=await groqChat([{role:'system',content:sys},{role:'user',content:question}]);
  if(!text.startsWith('My man')&&!text.startsWith('Oh word?'))text=opener+' '+text;
  return text;
}

// ── ISRAEL MODE ───────────────────────────────────────────────────────────
function triggerIsraelMode(){
  israelMode=true; israelTimer=5; starOfDavidEyes=true;
  const ov=document.getElementById('israel-overlay');
  ov.classList.add('active');
  setTimeout(()=>{
    ov.classList.remove('active');
    israelMode=false; starOfDavidEyes=false;
  },5000);
}

// ── MAIN ASK ──────────────────────────────────────────────────────────────
document.getElementById('question').addEventListener('keydown',e=>{if(e.key==='Enter')ask();});

async function ask(){
  const q=document.getElementById('question').value.trim();
  if(!q)return;
  if(!apiKey){setStatus('⚠ Save your Groq API key above first!','err');return;}
  document.getElementById('question').value='';
  document.getElementById('ask-btn').disabled=true;
  bubble=''; thinking=true; targetScale=1.45;
  setStatus('Connecting to Groq…');
  try{
    const answer=await callGroq(q);
    bubble=answer;
    qHistory.push({q,a:answer});
    questionCount++;
    setStatus('✓ Keith has spoken!','ok');
    if(questionCount>=nextQuizAt&&qHistory.length>=3){
      setTimeout(()=>startDevilMode(),10500);
    }
  }catch(e){
    const msg=e.message||String(e);
    let hint=msg;
    if(msg.includes('Failed to fetch')||msg.includes('NetworkError'))hint='Network blocked — try a hotspot.';
    else if(msg.includes('401'))hint='Invalid API key — re-paste from console.groq.com.';
    else if(msg.includes('429'))hint='Rate limited — wait a moment.';
    bubble='Oh word? '+hint; setStatus('❌ '+hint,'err');
  }
  thinking=false;
  document.getElementById('ask-btn').disabled=false;
  setTimeout(()=>{targetScale=1.0;},9000);
  setTimeout(()=>{bubble='';setStatus('');},11500);
}

function setStatus(msg,cls){
  const el=document.getElementById('status');
  el.textContent=msg; el.className=cls||'';
}

// ── DEVIL / TROY MODE ─────────────────────────────────────────────────────
function startDevilMode(){isDevil=true;isAngry=false;setTimeout(()=>launchQuiz(),2500);}
function endDevilMode(){isDevil=false;devilIntensity=0;isAngry=false;nextQuizAt=randQuizAt();}

// ── QUIZ ──────────────────────────────────────────────────────────────────
let quizQuestions=[],quizIdx=0,quizScore=0,quizTimer=null,quizTimeLeft=20,quizAnswered=false;

async function launchQuiz(){
  if(qHistory.length<3){endDevilMode();return;}
  const pool=[...qHistory].sort(()=>Math.random()-0.5).slice(0,3);
  quizQuestions=[]; setStatus('😈 Troy is generating your quiz…','err');
  for(const item of pool){
    try{
      const prompt=`Based on this Q&A:
Q: "${item.q}"
A: "${item.a}"
Create a multiple-choice quiz question. Respond ONLY with valid JSON (no markdown, no extra text):
{"question":"...","options":["A) ...","B) ...","C) ...","D) ..."],"correct":0}
"correct" is the 0-based index of the right answer. Make wrong answers plausible.`;
      const raw=await groqChat([{role:'user',content:prompt}],300);
      const cleaned=raw.replace(/```json|```/g,'').trim();
      quizQuestions.push(JSON.parse(cleaned));
    }catch(e){console.warn('Quiz parse error',e);}
  }
  if(quizQuestions.length===0){endDevilMode();return;}
  quizIdx=0; quizScore=0;
  document.getElementById('quiz-overlay').classList.add('active');
  showQuizQuestion();
}

function showQuizQuestion(){
  quizAnswered=false;
  const q=quizQuestions[quizIdx];
  document.getElementById('quiz-q').textContent=q.question;
  document.getElementById('quiz-feedback').textContent='';
  document.getElementById('quiz-score').textContent=`Question ${quizIdx+1} of ${quizQuestions.length}  |  Score: ${quizScore}`;
  document.getElementById('quiz-next-btn').style.display='none';
  const optsEl=document.getElementById('quiz-options');
  optsEl.innerHTML='';
  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='quiz-opt'; btn.textContent=opt;
    btn.onclick=()=>answerQuiz(i,btn);
    optsEl.appendChild(btn);
  });
  quizTimeLeft=20; updateTimerBar(20,20);
  clearInterval(quizTimer);
  quizTimer=setInterval(()=>{
    quizTimeLeft--; updateTimerBar(quizTimeLeft,20);
    if(quizTimeLeft<=0){clearInterval(quizTimer);if(!quizAnswered)timeoutQuiz();}
  },1000);
}

function updateTimerBar(left,total){
  const bar=document.getElementById('quiz-timer-bar');
  bar.style.width=(left/total*100)+'%';
  bar.style.background=left>10?'#ff2222':left>5?'#ff6600':'#ff0000';
}

function answerQuiz(idx,btn){
  if(quizAnswered)return;
  quizAnswered=true; clearInterval(quizTimer);
  const q=quizQuestions[quizIdx];
  const opts=document.querySelectorAll('.quiz-opt');
  if(idx===q.correct){
    btn.classList.add('correct'); quizScore++; isAngry=false;
    document.getElementById('quiz-feedback').innerHTML='<span style="color:#00cc44">✓ Correct! Troy nods reluctantly.</span>';
  }else{
    btn.classList.add('wrong'); opts[q.correct].classList.add('correct'); triggerAngry();
    document.getElementById('quiz-feedback').innerHTML='<span style="color:#ff4444">✗ Wrong! Troy is NOT pleased.</span>';
  }
  document.getElementById('quiz-score').textContent=`Question ${quizIdx+1} of ${quizQuestions.length}  |  Score: ${quizScore}`;
  document.getElementById('quiz-next-btn').style.display='block';
}

function timeoutQuiz(){
  quizAnswered=true;
  const q=quizQuestions[quizIdx];
  document.querySelectorAll('.quiz-opt')[q.correct].classList.add('correct');
  triggerAngry();
  document.getElementById('quiz-feedback').innerHTML='<span style="color:#ff4444">⏰ Time\'s up! Troy is FURIOUS.</span>';
  document.getElementById('quiz-score').textContent=`Question ${quizIdx+1} of ${quizQuestions.length}  |  Score: ${quizScore}`;
  document.getElementById('quiz-next-btn').style.display='block';
}

function triggerAngry(){isAngry=true;angryTimer=2.5;shake=8;}

function quizNext(){
  quizIdx++; isAngry=false;
  if(quizIdx>=quizQuestions.length)endQuiz();
  else showQuizQuestion();
}

function endQuiz(){
  clearInterval(quizTimer);
  document.getElementById('quiz-overlay').classList.remove('active');
  const total=quizQuestions.length, pct=Math.round((quizScore/total)*100);
  bubble=quizScore===total
    ?`My man, ${pct}% — PERFECT! Even back in my clubbing days I wasn't that sharp at 2am!`
    :quizScore>=total*0.6
    ?`Oh word? ${quizScore}/${total} — respectable. Troy expected worse, honestly.`
    :`My man, ${quizScore}/${total}... Troy is deeply, personally offended. Study harder, Keith Troy Green didn't go to school for this.`;
  isAngry=quizScore<total*0.6; if(isAngry)angryTimer=4;
  setTimeout(()=>endDevilMode(),3000);
  setTimeout(()=>{bubble='';isAngry=false;},11000);
}

// ── CANVAS ────────────────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,dpr=window.devicePixelRatio||1;

function resize(){
  const wrap=document.getElementById('scene-wrap');
  W=wrap.clientWidth; H=wrap.clientHeight;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
}
window.addEventListener('resize',resize); resize();

let bobT=0,last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,0.1); last=ts;
  bobT+=dt*1.5;
  kScale+=(targetScale-kScale)*0.12;
  if(thinking)dots+=dt*3;
  if(isDevil)devilIntensity=Math.min(1,devilIntensity+dt*0.8);
  else       devilIntensity=Math.max(0,devilIntensity-dt*1.2);
  if(angryTimer>0){angryTimer-=dt;if(angryTimer<=0)isAngry=false;}
  if(shake>0)shake*=0.85;
  draw(); requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function draw(){
  const c=ctx,p=dpr;
  c.setTransform(p,0,0,p,0,0);
  c.clearRect(0,0,W,H);
  const sx=isAngry?(Math.random()-0.5)*shake:0;
  const sy=isAngry?(Math.random()-0.5)*shake*0.5:0;
  c.translate(sx,sy);
  drawBg(c); drawDesk(c);
  const cx=W/2,cy=H*0.50+Math.sin(bobT)*2.5;
  drawKeith(c,cx,cy,kScale);
  if(thinking)drawThinking(c,cx,cy,kScale);
  if(bubble)  drawBubble(c,cx,cy,kScale);
  if(devilIntensity>0){
    const grad=c.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.8);
    grad.addColorStop(0,'rgba(0,0,0,0)');
    grad.addColorStop(1,`rgba(180,0,0,${devilIntensity*0.45})`);
    c.fillStyle=grad; c.fillRect(0,0,W,H);
  }
}

function rr(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();
}

function lerpColor(c1,c2,t){
  const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
}

function drawBg(c){
  const wallH=H*0.62;
  const wallCol=devilIntensity>0?lerpColor('#1a2a1a','#2a0a0a',devilIntensity):'#1a2a1a';
  c.fillStyle=wallCol; c.fillRect(0,0,W,wallH);
  c.fillStyle='#111108'; c.fillRect(0,wallH,W,H-wallH);
  const bx=W*0.20,by=12,bw=W*0.60,bh=H*0.44;
  c.fillStyle='#0a3a0a';c.strokeStyle='#2a5a2a';c.lineWidth=5;
  rr(c,bx,by,bw,bh,4);c.fill();c.stroke();
  c.fillStyle='#0c420c';rr(c,bx+10,by+10,bw-20,bh-20,2);c.fill();
  c.fillStyle='#b8ffb8';c.textAlign='center';
  const fs=Math.max(10,Math.min(14,W/50));
  c.font=`bold ${fs}px "Courier New"`;
  ['E = mc²','H₂O → H₂ + ½O₂','F = ma','PV = nRT','ΔG = ΔH − TΔS']
    .forEach((t,i)=>c.fillText(t,bx+bw/2,by+bh*(0.18+i*0.19)));
  if(W>400){
    c.fillStyle='#222211';c.strokeStyle='#887755';c.lineWidth=1.5;
    rr(c,10,25,120,130,3);c.fill();c.stroke();
    ['H','He','Li','Be','B','C','N','O','F','Ne','Na','Mg'].forEach((el,i)=>{
      const col=i%4,row=Math.floor(i/4),ex=16+col*27,ey=33+row*28;
      c.fillStyle='#334433';c.strokeStyle='#556655';c.lineWidth=0.8;
      rr(c,ex,ey,22,22,2);c.fill();c.stroke();
      c.fillStyle='#aaffaa';c.font=`8px "Courier New"`;c.textAlign='center';
      c.fillText(el,ex+11,ey+15);
    });
  }
  c.fillStyle='#111122';c.strokeStyle='#334466';c.lineWidth=1.5;
  rr(c,W-115,25,100,110,3);c.fill();c.stroke();
  c.fillStyle='#8899ff';c.font=`10px "Courier New"`;c.textAlign='center';
  c.fillText('🔬 SCIENCE',W-65,72);c.fillText('IS COOL',W-65,90);
  c.fillStyle='#88bbdd';c.strokeStyle='#aaa';c.lineWidth=2;
  rr(c,W-115,H*0.46,100,65,2);c.fill();c.stroke();
  c.beginPath();c.moveTo(W-65,H*0.46);c.lineTo(W-65,H*0.46+65);
  c.strokeStyle='#aaa';c.lineWidth=1.5;c.stroke();
  c.beginPath();c.moveTo(W-115,H*0.46+32);c.lineTo(W-15,H*0.46+32);c.stroke();
}

function drawDesk(c){
  const dy=H*0.77;
  c.fillStyle='#5c3d1e';c.fillRect(30,dy,W-60,26);
  c.fillStyle='#3b2a1a';c.fillRect(30,dy+26,W-60,H-dy-26);
  c.fillStyle='#66ccee';c.strokeStyle='#3399bb';c.lineWidth=1.5;
  rr(c,60,dy-30,22,32,2);c.fill();c.stroke();
  c.beginPath();c.ellipse(71,dy-30,14,7,0,0,Math.PI*2);
  c.fillStyle='#44aacc';c.fill();c.stroke();
  [['#8B0000',0],['#006400',1],['#00008B',2]].forEach(([col,i])=>{
    c.fillStyle=col;c.strokeStyle='#111';c.lineWidth=0.8;
    rr(c,W*0.67+i*4,dy-30+i*(-7),44,30,1);c.fill();c.stroke();
  });
  c.beginPath();c.ellipse(W*0.82,dy-17,13,16,0,0,Math.PI*2);
  c.fillStyle='#cc2200';c.fill();c.strokeStyle='#991100';c.lineWidth=1;c.stroke();
  c.beginPath();c.moveTo(W*0.82,dy-33);c.lineTo(W*0.82+2,dy-40);
  c.strokeStyle='#336600';c.lineWidth=2;c.stroke();
}

// ── STAR OF DAVID DRAW ────────────────────────────────────────────────────
function drawStarOfDavid(c,cx,cy,r,color){
  c.fillStyle=color;
  c.strokeStyle=color;
  c.lineWidth=1;
  // Two overlapping triangles
  for(let t=0;t<2;t++){
    c.beginPath();
    for(let i=0;i<3;i++){
      const angle=(Math.PI/2)+(i*2*Math.PI/3)+(t*Math.PI);
      const x=cx+r*Math.cos(angle), y=cy+r*Math.sin(angle);
      if(i===0)c.moveTo(x,y);else c.lineTo(x,y);
    }
    c.closePath();
    c.globalAlpha=0.85;c.fill();c.globalAlpha=1;
  }
}

function drawKeith(c,cx,cy,s){
  const d=devilIntensity;
  // Skin: very dark brown #4a2800 → devil dark red #3a0800
  const SKIN  =lerpColor('#4a2800','#3a0800',d);
  const SKIN_D=lerpColor('#2e1800','#220000',d);
  const SHIRT =lerpColor('#4a7abf','#8b0000',d);

  function ov(dx,dy2,rx,ry,fill,stroke,lw=1.5){
    c.beginPath();c.ellipse(cx+dx*s,cy+dy2*s,rx*s,ry*s,0,0,Math.PI*2);
    c.fillStyle=fill;c.fill();
    if(stroke){c.strokeStyle=stroke;c.lineWidth=lw*s;c.stroke();}
  }
  function ln(x1,y1,x2,y2,col,lw){
    c.beginPath();c.moveTo(cx+x1*s,cy+y1*s);c.lineTo(cx+x2*s,cy+y2*s);
    c.strokeStyle=col;c.lineWidth=lw*s;c.lineCap='round';c.stroke();
  }

  // arms
  ln(-28,60,-56,106,SHIRT,13);
  ln( 28,60, 56,106,SHIRT,13);
  // body
  ov(0,86,38,42,SHIRT,SKIN_D,2);
  // neck
  c.fillStyle=SKIN;c.fillRect(cx-11*s,cy+27*s,22*s,25*s);
  // head
  ov(0,-22,52,60,SKIN,SKIN_D,2);
  // wrinkles
  [-44,-37,-30].forEach(yl=>ln(-17,yl,17,yl,SKIN_D,1));
  // eyebrows
  ln(-37,-22,-13,-26,'#0a0000',3);ln(13,-26,37,-22,'#0a0000',3);
  // ears
  ov(-55,-8,8,10,SKIN,SKIN_D,1);ov(55,-8,8,10,SKIN,SKIN_D,1);
  // glasses
  c.globalAlpha=0.5;
  ov(-24,-9,15,10,'#aabbcc','#555',2);ov(24,-9,15,10,'#aabbcc','#555',2);
  c.globalAlpha=1;
  ov(-24,-9,15,10,'transparent','#555',2);ov(24,-9,15,10,'transparent','#555',2);
  ln(-9,-9,9,-9,'#555',2);ln(-39,-9,-55,-13,'#555',2);ln(39,-9,55,-13,'#555',2);

  // EYES
  if(starOfDavidEyes){
    // Stars of David instead of eyes
    drawStarOfDavid(c,cx-24*s,cy-9*s,7*s,'#0038b8');
    drawStarOfDavid(c,cx+24*s,cy-9*s,7*s,'#0038b8');
  } else if(d>0){
    c.save();
    c.shadowColor='#ff0000';c.shadowBlur=14*s*d;
    ov(-24,-9,5,5,`rgba(255,${Math.round(255*(1-d))},0,1)`);
    ov( 24,-9,5,5,`rgba(255,${Math.round(255*(1-d))},0,1)`);
    c.restore();
  } else {
    ov(-24,-9,5,5,'#111');ov(24,-9,5,5,'#111');
  }
  // eye shine (not during star mode)
  if(!starOfDavidEyes){
    ov(-27,-12,2.5,2.5,'white');ov(21,-12,2.5,2.5,'white');
  }

  // nose
  ov(0,10,5,7,SKIN_D);
  // mustache
  c.beginPath();c.ellipse(cx,cy+20*s,20*s,9*s,0,Math.PI,Math.PI*2);
  c.closePath();c.fillStyle='#0a0000';c.fill();
  // beard — grows when devil
  const beardH=15+d*10;
  ov(0,36+d*5,18+d*6,beardH,'#0a0000');
  // mouth
  if(d>0.3){
    c.beginPath();c.ellipse(cx,cy+26*s,11*s,5*s,0,0,Math.PI);
    c.closePath();c.fillStyle='#cc0000';c.fill();
    c.fillStyle='white';
    for(let i=0;i<4;i++)c.fillRect(cx+(-16+i*10)*s,cy+22*s,7*s,6*s);
  } else {
    c.beginPath();c.ellipse(cx,cy+29*s,9*s,6*s,0,Math.PI,Math.PI*2);
    c.closePath();c.fillStyle='#cc9966';c.fill();
  }
  // hands
  ov(-59,110,12,8,SKIN,SKIN_D,1);ov(59,110,12,8,SKIN,SKIN_D,1);

  // HORNS
  if(d>0){
    const hornH=32*s*d,hornW=11*s*d;
    c.beginPath();
    c.moveTo(cx-30*s,cy-78*s);
    c.quadraticCurveTo(cx-44*s,cy-78*s-hornH*0.6,cx-32*s,cy-78*s-hornH);
    c.quadraticCurveTo(cx-18*s,cy-78*s-hornH*0.4,cx-22*s,cy-78*s);
    c.closePath();
    c.fillStyle=`rgba(150,0,0,${d})`;c.fill();
    c.strokeStyle=`rgba(80,0,0,${d})`;c.lineWidth=1.5*s;c.stroke();

    c.beginPath();
    c.moveTo(cx+30*s,cy-78*s);
    c.quadraticCurveTo(cx+44*s,cy-78*s-hornH*0.6,cx+32*s,cy-78*s-hornH);
    c.quadraticCurveTo(cx+18*s,cy-78*s-hornH*0.4,cx+22*s,cy-78*s);
    c.closePath();
    c.fillStyle=`rgba(150,0,0,${d})`;c.fill();
    c.strokeStyle=`rgba(80,0,0,${d})`;c.lineWidth=1.5*s;c.stroke();

    // tail
    c.beginPath();
    c.moveTo(cx+36*s,cy+100*s);
    c.bezierCurveTo(cx+70*s,cy+110*s,cx+80*s,cy+85*s,cx+65*s,cy+75*s);
    c.strokeStyle=`rgba(150,0,0,${d})`;c.lineWidth=4*s;c.lineCap='round';c.stroke();
    c.beginPath();
    c.moveTo(cx+65*s,cy+75*s);c.lineTo(cx+72*s,cy+68*s);c.lineTo(cx+59*s,cy+68*s);
    c.closePath();c.fillStyle=`rgba(150,0,0,${d})`;c.fill();
  }

  // ANGRY GLOW
  if(isAngry){
    c.save();c.shadowColor='#ff0000';c.shadowBlur=30*s;
    c.beginPath();c.ellipse(cx,cy-22*s,52*s,60*s,0,0,Math.PI*2);
    c.strokeStyle=`rgba(255,0,0,${0.3+Math.random()*0.3})`;c.lineWidth=4*s;c.stroke();
    c.restore();
  }
}

function drawThinking(c,cx,cy,s){
  const txt='thinking'+'.'.repeat(Math.floor(dots)%4);
  const bx=cx+65*s,by=cy-100*s;
  c.font=`bold 13px "Courier New"`;
  [...txt].forEach((ch,i)=>{
    const bob=Math.sin(Date.now()/250+i*0.5)*5;
    c.fillStyle=isDevil?'#ff4400':'#f39c12';
    c.textAlign='left';
    c.fillText(ch,bx+i*11,by+bob);
  });
}

function drawBubble(c,cx,cy,s){
  const bx=cx+60*s,by=cy-135*s;
  const maxW=Math.min(320,W-bx-10);
  const fontSize=14;
  c.font=`bold ${fontSize}px "Courier New"`;
  const words=bubble.split(' '),lines=[];
  let line='';
  words.forEach(w=>{
    const test=line?line+' '+w:w;
    if(c.measureText(test).width<maxW-28){line=test;}
    else{if(line)lines.push(line);line=w;}
  });
  if(line)lines.push(line);
  const lh=22,bh=lines.length*lh+28,bw=maxW;
  let rx=bx,ry=by;
  if(rx+bw>W-6){rx=W-bw-6;}
  if(rx<6){rx=6;}
  if(ry<6){ry=6;}
  const bbg=isDevil?'#1a0000':'#fffef0';
  const bbd=isDevil?'#ff2200':'#333';
  const btx=isDevil?'#ff9999':'#111';
  c.fillStyle=bbg;c.strokeStyle=bbd;c.lineWidth=2.5;
  rr(c,rx,ry,bw,bh,10);c.fill();c.stroke();
  const tx=Math.min(rx+44,rx+bw-22);
  c.beginPath();c.moveTo(tx,ry+bh);c.lineTo(tx-9,ry+bh+18);c.lineTo(tx+16,ry+bh);
  c.closePath();c.fillStyle=bbg;c.fill();
  c.beginPath();c.moveTo(tx-9,ry+bh+18);c.lineTo(tx+16,ry+bh);
  c.strokeStyle=bbd;c.lineWidth=2.5;c.stroke();
  c.beginPath();c.moveTo(tx-9,ry+bh+1);c.lineTo(tx+17,ry+bh+1);
  c.strokeStyle=bbg;c.lineWidth=3.5;c.stroke();
  c.fillStyle=btx;c.textAlign='left';c.font=`bold ${fontSize}px "Courier New"`;
  lines.forEach((ln,i)=>c.fillText(ln,rx+14,ry+20+i*lh));
}
