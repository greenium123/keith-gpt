<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Greenium</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#000;font-family:'Courier New',monospace;height:100dvh;overflow:hidden;display:flex;flex-direction:column;color:#e0f0ff}

/* LOADER */
#g-loader{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 1s ease}
#g-loader.out{opacity:0;pointer-events:none}
#g-particles{position:absolute;inset:0;overflow:hidden}
.g-pt{position:absolute;border-radius:50%;animation:gFl linear infinite}
@keyframes gFl{0%{transform:translateY(100vh) scale(0);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translateY(-20vh) scale(1);opacity:0}}
#g-atom-spin{font-size:52px;animation:gSpin 3s linear infinite;margin-bottom:16px}
@keyframes gSpin{to{transform:rotate(360deg)}}
#g-loader-title{font-size:clamp(52px,15vw,100px);font-weight:900;color:#00ff88;letter-spacing:10px;text-shadow:0 0 40px #00ff88,0 0 80px #00cc66;opacity:0;transform:scale(0.4);transition:all 1s cubic-bezier(.17,.67,.35,1.3)}
#g-loader-title.show{opacity:1;transform:scale(1)}
#g-loader-sub{font-size:clamp(11px,3vw,16px);color:#00cc66;letter-spacing:5px;margin-top:10px;opacity:0;transition:opacity .8s ease .7s}
#g-loader-sub.show{opacity:1}
#g-lbar-w{margin-top:36px;width:200px;height:4px;background:#0a1a0a;border-radius:2px;overflow:hidden}
#g-lbar{height:100%;width:0%;background:linear-gradient(90deg,#00ff88,#00cc44);transition:width 2.6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px #00ff88}

/* SETUP */
#g-setup{display:none;position:fixed;inset:0;background:linear-gradient(160deg,#000 0%,#050f05 60%,#000 100%);flex-direction:column;align-items:center;padding:24px;overflow-y:auto;-webkit-overflow-scrolling:touch}
#g-setup.on{display:flex}
.gs-title{font-size:clamp(20px,5vw,32px);font-weight:bold;color:#00ff88;text-shadow:0 0 16px #00ff88;margin-bottom:4px;text-align:center;letter-spacing:3px;padding-top:16px}
.gs-sub{color:#00aa55;font-size:12px;margin-bottom:28px;text-align:center;letter-spacing:1px}
.gs-group{width:100%;max-width:400px;margin-bottom:18px}
.gs-label{font-size:11px;color:#00cc66;letter-spacing:2px;margin-bottom:7px;display:block}
.gs-input{width:100%;background:#050f05;color:#00ff88;border:1.5px solid #00aa44;border-radius:10px;padding:12px 14px;font-family:'Courier New',monospace;font-size:14px;outline:none;-webkit-appearance:none}
.gs-input:focus{border-color:#00ff88;box-shadow:0 0 10px rgba(0,255,136,.18)}
.gs-input::placeholder{color:#1a4a2a}
.dim-row{display:flex;gap:10px}
.dim-btn{flex:1;padding:14px;border:2px solid #00aa44;border-radius:10px;background:transparent;color:#00cc66;font-family:'Courier New',monospace;font-size:14px;font-weight:bold;cursor:pointer;transition:all .2s}
.dim-btn.sel{background:#00aa44;color:#000;box-shadow:0 0 14px #00ff88}
#g-begin{width:100%;max-width:400px;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#00cc66,#009944);color:#000;font-family:'Courier New',monospace;font-size:15px;font-weight:bold;cursor:pointer;letter-spacing:2px;box-shadow:0 0 20px rgba(0,255,136,.35);margin-top:6px}
#g-begin:active{transform:scale(.97)}
.sw-section{width:100%;max-width:400px;margin-bottom:18px}
.sw-head{font-size:10px;color:#00aa55;letter-spacing:2px;margin-bottom:7px}
.sw-item{background:#050f05;border:1px solid #00aa44;border-radius:8px;padding:9px 12px;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.sw-name{color:#00ff88;font-size:12px;font-weight:bold}
.sw-meta{color:#00aa44;font-size:9px;margin-top:1px}
.sw-load{color:#00ff88;font-size:11px;cursor:pointer;padding:3px 8px;border:1px solid #00aa44;border-radius:5px}
.sw-del{color:#e74c3c;font-size:11px;cursor:pointer;padding:3px 8px;border:1px solid #e74c3c;border-radius:5px;margin-left:4px}

/* MAIN */
#g-main{display:none;position:fixed;inset:0;flex-direction:column;background:#000}
#g-main.on{display:flex}
#g-hdr{background:#020a02;border-bottom:2px solid #00aa44;padding:7px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#g-hdr-name{color:#00ff88;font-size:12px;font-weight:bold;letter-spacing:1px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#g-dim-badge{background:#00aa44;color:#000;font-size:9px;font-weight:bold;padding:2px 6px;border-radius:4px}
.ghbtn{background:#050f05;color:#00cc66;border:1px solid #00aa44;border-radius:7px;padding:5px 9px;font-family:'Courier New',monospace;font-size:9px;cursor:pointer;white-space:nowrap}
.ghbtn:active{background:#0a1a0a}

/* WORLD LAYOUT */
#g-body{flex:1;display:flex;min-height:0;overflow:hidden}
#g-canvas-wrap{flex:1;position:relative;overflow:hidden;background:#000;touch-action:none;cursor:grab}
#g-canvas-wrap:active{cursor:grabbing}
#g-world-canvas{position:absolute;top:0;left:0;display:block}
/* Controls hint */
#g-ctrl-hint{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:rgba(0,255,136,.6);font-size:9px;padding:3px 10px;border-radius:10px;pointer-events:none;white-space:nowrap;transition:opacity 1s}
#g-toolbar{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:2}
.g-tool-btn{background:rgba(5,15,5,.85);color:#00cc66;border:1.5px solid #00aa44;border-radius:8px;padding:6px 12px;font-family:'Courier New',monospace;font-size:10px;cursor:pointer;backdrop-filter:blur(4px)}
.g-tool-btn:active{background:#0a2a0a}

/* Side pane */
#g-side{width:min(44%,230px);background:#020a02;border-left:2px solid #00aa44;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
@media(max-width:560px){
  #g-body{flex-direction:column}
  #g-side{width:100%;height:190px;border-left:none;border-top:2px solid #00aa44;flex-direction:row}
}
#g-keith-box{padding:10px;display:flex;flex-direction:column;align-items:center;border-bottom:1px solid #0a2a0a;flex-shrink:0}
@media(max-width:560px){#g-keith-box{border-bottom:none;border-right:1px solid #0a2a0a;width:80px;justify-content:center;flex-shrink:0}}
#g-keith-face{border-radius:50%;border:2px solid #00aa44;box-shadow:0 0 10px rgba(0,255,136,.35);background:#050f05}
.gkname{color:#00cc66;font-size:8px;letter-spacing:2px;margin-top:4px;text-align:center}
#g-chat{flex:1;overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:5px;min-height:0}
#g-chat::-webkit-scrollbar{width:2px}
#g-chat::-webkit-scrollbar-thumb{background:#00aa44;border-radius:1px}
.gm{font-size:10px;line-height:1.5;padding:6px 8px;border-radius:7px;word-break:break-word;max-width:100%}
.gm.k{background:#0a1f0a;color:#00ff88;border-left:2px solid #00ff88}
.gm.u{background:#0a1020;color:#aaddff;border-left:2px solid #4488cc}
.gm.s{color:#555;font-size:9px;font-style:italic;border-left:2px solid #222;background:transparent}

/* BOTTOM */
#g-bot{background:#020a02;border-top:2px solid #00aa44;padding:9px 12px calc(10px + env(safe-area-inset-bottom));flex-shrink:0}
#g-inp-row{display:flex;gap:7px;align-items:center}
#g-inp{flex:1;background:#050f05;color:#00ff88;border:1.5px solid #00aa44;border-radius:9px;padding:10px 12px;font-family:'Courier New',monospace;font-size:13px;outline:none;caret-color:#00ff88;-webkit-appearance:none}
#g-inp::placeholder{color:#1a4a2a}
#g-inp:focus{border-color:#00ff88;box-shadow:0 0 6px rgba(0,255,136,.2)}
#g-send{background:linear-gradient(135deg,#00cc66,#009944);color:#000;border:none;border-radius:9px;padding:10px 14px;font-family:'Courier New',monospace;font-size:13px;font-weight:bold;cursor:pointer;white-space:nowrap;box-shadow:0 0 10px rgba(0,255,136,.25)}
#g-send:disabled{background:#0a2a0a;color:#1a4a1a;box-shadow:none}
#g-send:active:not(:disabled){transform:scale(.97)}
#g-stat{font-size:9px;color:#00aa44;margin-top:3px;min-height:11px;text-align:center}

/* Thinking overlay */
#g-thinking{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.6);z-index:5}
#g-thinking.on{display:flex}
#g-think-txt{color:#00ff88;font-size:13px;font-weight:bold;letter-spacing:2px;animation:gPulse 1s ease-in-out infinite}
@keyframes gPulse{0%,100%{opacity:1;text-shadow:0 0 8px #00ff88}50%{opacity:.4;text-shadow:none}}
</style>
</head>
<body>

<!-- LOADER -->
<div id="g-loader">
  <div id="g-particles"></div>
  <div id="g-atom-spin">⚗</div>
  <div id="g-loader-title">GREENIUM</div>
  <div id="g-loader-sub">KEITH BECOMES GOD</div>
  <div id="g-lbar-w"><div id="g-lbar"></div></div>
</div>

<!-- SETUP -->
<div id="g-setup">
  <div class="gs-title">⚗ GREENIUM</div>
  <div class="gs-sub">Create your world. Keith will build it.</div>
  <div class="sw-section" id="g-sw-sec" style="display:none">
    <div class="sw-head">📂 YOUR SAVED WORLDS</div>
    <div id="g-sw-list"></div>
  </div>
  <div class="gs-group">
    <label class="gs-label">🌍 WORLD NAME</label>
    <input class="gs-input" id="g-wname" placeholder="e.g. Quantum Jungle, Neon City..." maxlength="40">
  </div>
  <div class="gs-group">
    <label class="gs-label">📐 DIMENSION</label>
    <div class="dim-row">
      <button class="dim-btn sel" id="g-b2d" onclick="selDim('2d')">2D</button>
      <button class="dim-btn" id="g-b3d" onclick="selDim('3d')">3D</button>
    </div>
  </div>
  <div class="gs-group">
    <label class="gs-label">✨ FIRST CREATION (optional)</label>
    <input class="gs-input" id="g-fp" placeholder="e.g. A glowing chemistry lab..." maxlength="200">
  </div>
  <button id="g-begin" onclick="beginWorld()">⚗ CREATE WORLD →</button>
  <div style="height:24px"></div>
</div>

<!-- MAIN -->
<div id="g-main">
  <div id="g-hdr">
    <div id="g-hdr-name">World</div>
    <div id="g-dim-badge">2D</div>
    <button class="ghbtn" onclick="saveClose()">💾 Save</button>
    <button class="ghbtn" onclick="goBack()">✕ Exit</button>
  </div>
  <div id="g-body">
    <div id="g-canvas-wrap">
      <canvas id="g-world-canvas"></canvas>
      <div id="g-ctrl-hint">✌ pinch·zoom | drag·pan | 2-finger·rotate</div>
      <div id="g-toolbar">
        <button class="g-tool-btn" onclick="resetView()">⌖ Reset View</button>
        <button class="g-tool-btn" onclick="clearWorld()">🗑 Clear</button>
      </div>
      <div id="g-thinking"><div id="g-think-txt">⚗ KEITH IS CREATING...</div></div>
    </div>
    <div id="g-side">
      <div id="g-keith-box">
        <canvas id="g-keith-face" width="64" height="64"></canvas>
        <div class="gkname">KEITH GPT</div>
      </div>
      <div id="g-chat"></div>
    </div>
  </div>
  <div id="g-bot">
    <div id="g-inp-row">
      <input id="g-inp" type="text" placeholder="Add something to your world..." maxlength="300">
      <button id="g-send" onclick="gSend()">CREATE →</button>
    </div>
    <div id="g-stat"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// CONFIG & SESSION
// ═══════════════════════════════════════════
const PROXY='https://super-heart-37c5.jadelady1912.workers.dev';
let gUser=null;
try{gUser=JSON.parse(sessionStorage.getItem('greenium_user')||'null');}catch(e){}
if(!gUser){window.location.href='index.html';}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let gDim='2d', gWorldName='', gWorldKey='';
let gObjects=[];   // scene graph objects
let gChat=[];      // {role,content}
let gSending=false;

// ── VIEWPORT (pan + zoom + rotate) ──────────
let vpX=0,vpY=0,vpScale=1,vpRot=0;  // current
let panStart=null;                    // {x,y,vpX,vpY}
let pinchStart=null;                  // {dist,scale,midX,midY,rot,vpRot}
let twoTouchStart=null;

// ── CANVAS ──────────────────────────────────
let canvas,ctx,CW,CH,DPR=window.devicePixelRatio||1;

// ═══════════════════════════════════════════
// LOADER
// ═══════════════════════════════════════════
window.addEventListener('DOMContentLoaded',()=>{
  spawnPts();
  const T=document.getElementById('g-loader-title');
  const S=document.getElementById('g-loader-sub');
  const B=document.getElementById('g-lbar');
  const L=document.getElementById('g-loader');
  setTimeout(()=>T.classList.add('show'),200);
  setTimeout(()=>S.classList.add('show'),900);
  setTimeout(()=>B.style.width='100%',300);
  setTimeout(()=>{
    L.classList.add('out');
    setTimeout(()=>{L.style.display='none';showSetup();},1000);
  },3600);
});
function spawnPts(){
  const w=document.getElementById('g-particles');
  const syms=['⚗','⚛','🧪','◆','✦','⬡'];
  for(let i=0;i<30;i++){
    const p=document.createElement('div');p.className='g-pt';
    const sz=6+Math.random()*18;
    p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;background:rgba(0,${140+Math.floor(Math.random()*115)},${40+Math.floor(Math.random()*80)},${.25+Math.random()*.4});animation-duration:${3+Math.random()*6}s;animation-delay:${Math.random()*5}s;font-size:${sz*.7}px;display:flex;align-items:center;justify-content:center;color:rgba(0,255,136,${.3+Math.random()*.5});`;
    if(Math.random()>.45)p.textContent=syms[Math.floor(Math.random()*syms.length)];
    w.appendChild(p);
  }
}

// ═══════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════
function showSetup(){
  document.getElementById('g-setup').classList.add('on');
  loadSavedList();
}
function selDim(d){
  gDim=d;
  document.getElementById('g-b2d').classList.toggle('sel',d==='2d');
  document.getElementById('g-b3d').classList.toggle('sel',d==='3d');
}
function getSW(){return JSON.parse(localStorage.getItem('gw_'+(gUser?.key||'g'))||'{}');}
function setSW(d){localStorage.setItem('gw_'+(gUser?.key||'g'),JSON.stringify(d));}
function loadSavedList(){
  const sw=getSW(),keys=Object.keys(sw).reverse();
  const sec=document.getElementById('g-sw-sec');
  if(!keys.length){sec.style.display='none';return;}
  sec.style.display='block';
  const list=document.getElementById('g-sw-list');list.innerHTML='';
  keys.forEach(k=>{
    const w=sw[k];
    const d=document.createElement('div');d.className='sw-item';
    d.innerHTML=`<div style="flex:1;cursor:pointer" onclick="loadWorld('${k}')"><div class="sw-name">${w.name}</div><div class="sw-meta">${(w.dim||'2d').toUpperCase()} · ${(w.objects||[]).length} objects · ${new Date(w.ts||Date.now()).toLocaleDateString()}</div></div><span class="sw-load" onclick="loadWorld('${k}')">Open</span><span class="sw-del" onclick="delWorld('${k}')">🗑</span>`;
    list.appendChild(d);
  });
}
function delWorld(k){const d=getSW();delete d[k];setSW(d);loadSavedList();}
function loadWorld(k){
  const w=getSW()[k];if(!w)return;
  gWorldKey=k;gWorldName=w.name;gDim=w.dim||'2d';
  gObjects=w.objects||[];gChat=w.chat||[];
  openMain();
  gChat.forEach(m=>addMsg(m.content,m.role));
}
function beginWorld(){
  const name=document.getElementById('g-wname').value.trim();
  if(!name){alert('Name your world!');return;}
  gWorldName=name;gWorldKey='w'+Date.now();
  gObjects=[];gChat=[];
  openMain();
  const fp=document.getElementById('g-fp').value.trim();
  if(fp)setTimeout(()=>gGenerate(fp),600);
  else addMsg('My man, your world is blank and ready. Tell me what to create.','k');
}

// ═══════════════════════════════════════════
// MAIN WORLD
// ═══════════════════════════════════════════
function openMain(){
  document.getElementById('g-setup').classList.remove('on');
  document.getElementById('g-main').classList.add('on');
  document.getElementById('g-hdr-name').textContent=gWorldName;
  document.getElementById('g-dim-badge').textContent=gDim.toUpperCase();
  canvas=document.getElementById('g-world-canvas');
  ctx=canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize',resizeCanvas);
  initVP();
  drawWorld();
  drawKeithFace();
  bindControls();
  document.getElementById('g-inp').addEventListener('keydown',e=>{if(e.key==='Enter')gSend();});
  // Fade hint
  setTimeout(()=>document.getElementById('g-ctrl-hint').style.opacity='0',4000);
}

function resizeCanvas(){
  const wrap=document.getElementById('g-canvas-wrap');
  CW=wrap.clientWidth;CH=wrap.clientHeight;
  DPR=window.devicePixelRatio||1;
  canvas.width=CW*DPR;canvas.height=CH*DPR;
  canvas.style.width=CW+'px';canvas.style.height=CH+'px';
  drawWorld();
}

function initVP(){vpX=CW/2;vpY=CH/2;vpScale=1;vpRot=0;}
function resetView(){vpX=CW/2;vpY=CH/2;vpScale=1;vpRot=0;drawWorld();}

// ═══════════════════════════════════════════
// VIEWPORT CONTROLS
// ═══════════════════════════════════════════
function bindControls(){
  const el=document.getElementById('g-canvas-wrap');
  // Mouse
  el.addEventListener('mousedown',onMD);
  el.addEventListener('mousemove',onMM);
  el.addEventListener('mouseup',onMU);
  el.addEventListener('wheel',onWheel,{passive:false});
  // Touch
  el.addEventListener('touchstart',onTS,{passive:false});
  el.addEventListener('touchmove',onTM,{passive:false});
  el.addEventListener('touchend',onTE,{passive:false});
}

function onMD(e){
  if(e.button!==0)return;
  panStart={x:e.clientX,y:e.clientY,vpX,vpY};
}
function onMM(e){
  if(!panStart)return;
  vpX=panStart.vpX+(e.clientX-panStart.x);
  vpY=panStart.vpY+(e.clientY-panStart.y);
  drawWorld();
}
function onMU(){panStart=null;}
function onWheel(e){
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const factor=e.deltaY<0?1.1:0.9;
  zoomAt(mx,my,factor);
}

function zoomAt(mx,my,factor){
  // Zoom toward cursor/pinch point
  const nx=(mx-vpX)*factor,ny=(my-vpY)*factor;
  vpScale*=factor;vpScale=Math.max(0.05,Math.min(50,vpScale));
  vpX=mx-nx;vpY=my-ny;
  drawWorld();
}

function getTouches(e){return Array.from(e.touches);}
function touchMid(t1,t2){return{x:(t1.clientX+t2.clientX)/2,y:(t1.clientY+t2.clientY)/2};}
function touchDist(t1,t2){return Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);}
function touchAngle(t1,t2){return Math.atan2(t2.clientY-t1.clientY,t2.clientX-t1.clientX);}

function onTS(e){
  e.preventDefault();
  const ts=getTouches(e);
  if(ts.length===1){
    panStart={x:ts[0].clientX,y:ts[0].clientY,vpX,vpY};
    twoTouchStart=null;pinchStart=null;
  } else if(ts.length===2){
    panStart=null;
    const rect=canvas.getBoundingClientRect();
    const mid=touchMid(ts[0],ts[1]);
    pinchStart={
      dist:touchDist(ts[0],ts[1]),
      scale:vpScale,
      midX:mid.x-rect.left,midY:mid.y-rect.top,
      angle:touchAngle(ts[0],ts[1]),
      vpRot,vpX,vpY
    };
  }
}
function onTM(e){
  e.preventDefault();
  const ts=getTouches(e);
  if(ts.length===1&&panStart){
    vpX=panStart.vpX+(ts[0].clientX-panStart.x);
    vpY=panStart.vpY+(ts[0].clientY-panStart.y);
    drawWorld();
  } else if(ts.length===2&&pinchStart){
    const rect=canvas.getBoundingClientRect();
    const dist=touchDist(ts[0],ts[1]);
    const mid=touchMid(ts[0],ts[1]);
    const angle=touchAngle(ts[0],ts[1]);
    const scaleFactor=dist/pinchStart.dist;
    const dAngle=angle-pinchStart.angle;
    // Apply new scale centered on pinch mid
    const newScale=Math.max(0.05,Math.min(50,pinchStart.scale*scaleFactor));
    const mx=mid.x-rect.left,my=mid.y-rect.top;
    // Recompute pan so pinch centre stays fixed
    vpScale=newScale;
    vpRot=pinchStart.vpRot+dAngle;
    vpX=mx-(pinchStart.midX-pinchStart.vpX)*scaleFactor;
    vpY=my-(pinchStart.midY-pinchStart.vpY)*scaleFactor;
    drawWorld();
  }
}
function onTE(e){
  if(getTouches(e).length===0){panStart=null;pinchStart=null;}
}

// ═══════════════════════════════════════════
// DRAW WORLD
// ═══════════════════════════════════════════
function drawWorld(){
  if(!ctx)return;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,CW,CH);
  // Background
  drawBg();
  // Apply viewport transform
  ctx.save();
  ctx.translate(vpX,vpY);
  ctx.rotate(vpRot);
  ctx.scale(vpScale,vpScale);
  // Draw all objects
  gObjects.forEach(obj=>{
    ctx.save();
    renderObj(obj);
    ctx.restore();
  });
  ctx.restore();
}

function drawBg(){
  const c=ctx;
  if(gDim==='3d'){
    // Deep space + ground plane
    const sky=c.createLinearGradient(0,0,0,CH);
    sky.addColorStop(0,'#000508');sky.addColorStop(0.55,'#00050a');sky.addColorStop(1,'#050f05');
    c.fillStyle=sky;c.fillRect(0,0,CW,CH);
    // Stars
    c.fillStyle='rgba(0,255,136,0.6)';
    for(let i=0;i<120;i++){
      const sx=(Math.sin(i*74.3)*0.5+0.5)*CW;
      const sy=(Math.sin(i*37.1)*0.5+0.5)*CH*0.65;
      const sr=Math.sin(i*11.7)*0.7+0.8;
      c.beginPath();c.arc(sx,sy,sr,0,Math.PI*2);c.fill();
    }
    // Horizon glow
    const hg=c.createLinearGradient(0,CH*0.5,0,CH*0.7);
    hg.addColorStop(0,'rgba(0,255,136,0)');hg.addColorStop(1,'rgba(0,80,40,0.35)');
    c.fillStyle=hg;c.fillRect(0,CH*0.5,CW,CH*0.2);
    // Ground
    const grd=c.createLinearGradient(0,CH*0.65,0,CH);
    grd.addColorStop(0,'#050f05');grd.addColorStop(1,'#000');
    c.fillStyle=grd;c.fillRect(0,CH*0.65,CW,CH*0.35);
    // Perspective grid
    const vp2={x:CW/2,y:CH*0.65};
    c.strokeStyle='rgba(0,255,136,0.07)';c.lineWidth=1;
    for(let i=0;i<=20;i++){const x=CW*i/20;c.beginPath();c.moveTo(x,CH);c.lineTo(vp2.x,vp2.y);c.stroke();}
    for(let i=0;i<=10;i++){
      const t=i/10;const y=vp2.y+t*(CH-vp2.y);
      const xL=vp2.x-(CW/2)*t*1.2,xR=vp2.x+(CW/2)*t*1.2;
      c.beginPath();c.moveTo(xL,y);c.lineTo(xR,y);c.stroke();
    }
  } else {
    // 2D dark grid world
    const bg=c.createLinearGradient(0,0,0,CH);
    bg.addColorStop(0,'#000805');bg.addColorStop(1,'#000300');
    c.fillStyle=bg;c.fillRect(0,0,CW,CH);
    c.strokeStyle='rgba(0,255,136,0.04)';c.lineWidth=1;
    const gs=50;
    for(let x=0;x<CW;x+=gs){c.beginPath();c.moveTo(x,0);c.lineTo(x,CH);c.stroke();}
    for(let y=0;y<CH;y+=gs){c.beginPath();c.moveTo(0,y);c.lineTo(CW,y);c.stroke();}
    c.strokeStyle='rgba(0,255,136,0.12)';c.lineWidth=2;
    c.strokeRect(1,1,CW-2,CH-2);
    // Subtle centre crosshair
    c.strokeStyle='rgba(0,255,136,0.06)';c.lineWidth=1;
    c.beginPath();c.moveTo(CW/2,0);c.lineTo(CW/2,CH);c.stroke();
    c.beginPath();c.moveTo(0,CH/2);c.lineTo(CW,CH/2);c.stroke();
  }
}

// ─── RICH RENDER ENGINE ──────────────────────────────
function renderObj(obj){
  const c=ctx;
  const ox=(obj.x||0)*CW, oy=(obj.y||0)*CH;
  const ow=(obj.w||0.1)*CW, oh=(obj.h||0.1)*CH;
  const or_=(obj.r||Math.min(ow,oh)/2);
  const angle=obj.angle||0;

  c.translate(ox,oy);
  if(angle)c.rotate(angle);

  // Glow
  const gc=obj.glow||obj.color||obj.fill||'#00ff88';
  c.shadowColor=gc; c.shadowBlur=obj.glowSize||18;

  const fill=obj.fill||'none';
  const stroke=obj.stroke||obj.color||'#00ff88';
  const lw=(obj.lineWidth||2);

  c.fillStyle=fill==='none'?'transparent':fill;
  c.strokeStyle=stroke;
  c.lineWidth=lw;
  c.lineCap='round';c.lineJoin='round';

  switch(obj.type){

    // ── SHAPES ──────────────────────────────
    case 'circle':
      c.beginPath();c.arc(0,0,or_,0,Math.PI*2);
      if(fill!=='none')c.fill();c.stroke();
      break;

    case 'ring':
      c.beginPath();c.arc(0,0,or_,0,Math.PI*2);
      c.strokeStyle=stroke;c.lineWidth=obj.thickness||or_*0.25;c.stroke();
      break;

    case 'rect':
      rr2(c,-ow/2,-oh/2,ow,oh,obj.radius||0);
      if(fill!=='none')c.fill();c.stroke();
      break;

    case 'triangle':{
      const pts=obj.points||[[-ow/2,oh/2],[0,-oh/2],[ow/2,oh/2]];
      poly(c,pts,fill,stroke,lw);break;
    }

    case 'polygon':
    case 'star':{
      const sides=obj.sides||5;
      const pts=[];
      const innerR=obj.type==='star'?or_*0.45:or_;
      for(let i=0;i<sides;i++){
        const a=i*2*Math.PI/sides-Math.PI/2;
        pts.push([Math.cos(a)*or_,Math.sin(a)*or_]);
        if(obj.type==='star'){
          const a2=(i+0.5)*2*Math.PI/sides-Math.PI/2;
          pts.push([Math.cos(a2)*innerR,Math.sin(a2)*innerR]);
        }
      }
      poly(c,pts,fill,stroke,lw);break;
    }

    case 'ellipse':
      c.beginPath();c.ellipse(0,0,ow/2,oh/2,0,0,Math.PI*2);
      if(fill!=='none')c.fill();c.stroke();
      break;

    case 'arc':
      c.beginPath();c.arc(0,0,or_,obj.startAngle||0,obj.endAngle||Math.PI*1.5);
      c.strokeStyle=stroke;c.lineWidth=obj.lineWidth||3;c.stroke();
      break;

    case 'line':
    case 'polyline':{
      const pts=obj.points||[[-ow/2,0],[ow/2,0]];
      c.beginPath();
      pts.forEach((p,i)=>{const px=p[0]*CW,py=p[1]*CH;i===0?c.moveTo(px-ox,py-oy):c.lineTo(px-ox,py-oy);});
      c.strokeStyle=stroke;c.lineWidth=lw;
      if(obj.dash)c.setLineDash(obj.dash);
      c.stroke();c.setLineDash([]);
      break;
    }

    case 'bezier':{
      const pts=obj.points||[];
      if(pts.length>=4){
        c.beginPath();
        c.moveTo(pts[0][0]*CW-ox,pts[0][1]*CH-oy);
        c.bezierCurveTo(pts[1][0]*CW-ox,pts[1][1]*CH-oy,pts[2][0]*CW-ox,pts[2][1]*CH-oy,pts[3][0]*CW-ox,pts[3][1]*CH-oy);
        c.strokeStyle=stroke;c.lineWidth=lw;c.stroke();
      }break;
    }

    case 'text':{
      const fs=(obj.fontSize||0.035)*CH;
      c.font=`${obj.fontWeight||'bold'} ${fs}px "${obj.font||'Courier New'}", monospace`;
      c.fillStyle=stroke;c.textAlign=obj.align||'center';c.textBaseline='middle';
      c.shadowBlur=16;
      if(obj.outline){c.strokeStyle=obj.outline;c.lineWidth=fs*0.08;c.strokeText(obj.text||'',0,0);}
      c.fillText(obj.text||'',0,0);
      break;
    }

    // ── SCIENCE / CHEMISTRY ─────────────────
    case 'atom':{
      // Nucleus
      const nr=or_*0.22;
      const nucGrad=c.createRadialGradient(0,0,0,0,0,nr);
      nucGrad.addColorStop(0,'#ffff88');nucGrad.addColorStop(1,fill||'#ff8800');
      c.beginPath();c.arc(0,0,nr,0,Math.PI*2);c.fillStyle=nucGrad;c.fill();
      c.shadowColor='#ff8800';c.shadowBlur=20;
      // Orbits
      const orbits=obj.orbits||3;
      for(let i=0;i<orbits;i++){
        const oAngle=i*Math.PI/orbits;
        c.save();c.rotate(oAngle);
        c.beginPath();c.ellipse(0,0,or_,or_*0.35,0,0,Math.PI*2);
        c.strokeStyle=stroke||'#00ff88';c.lineWidth=1.5;c.shadowBlur=10;c.stroke();
        // Electron
        const eAngle=(Date.now()/600+i*2.1)%(Math.PI*2);
        const ex=Math.cos(eAngle)*or_,ey=Math.sin(eAngle)*or_*0.35;
        c.beginPath();c.arc(ex,ey,or_*0.07,0,Math.PI*2);
        c.fillStyle='#00ffff';c.shadowColor='#00ffff';c.shadowBlur=15;c.fill();
        c.restore();
      }
      requestAnimationFrame(drawWorld);break;
    }

    case 'molecule':{
      const atoms=obj.atoms||[{x:0,y:0,el:'C'},{x:0.08,y:0,el:'H'},{x:-0.08,y:0,el:'H'},{x:0,y:0.08,el:'O'}];
      // Bonds first
      const bonds=obj.bonds||[[0,1],[0,2],[0,3]];
      bonds.forEach(([a,b])=>{
        if(!atoms[a]||!atoms[b])return;
        const ax=atoms[a].x*CW-ox,ay=atoms[a].y*CH-oy;
        const bx=atoms[b].x*CW-ox,by=atoms[b].y*CH-oy;
        c.beginPath();c.moveTo(ax,ay);c.lineTo(bx,by);
        c.strokeStyle='rgba(200,200,200,0.7)';c.lineWidth=2;c.shadowBlur=4;c.stroke();
      });
      // Atoms
      const elColors={'H':'#ffffff','C':'#333333','N':'#4444ff','O':'#ff4444','F':'#44ff44','Cl':'#00ff00','Na':'#aa00ff','default':'#888888'};
      atoms.forEach(at=>{
        const ax=at.x*CW-ox,ay=at.y*CH-oy,ar=(at.r||0.025)*Math.min(CW,CH);
        const ec=elColors[at.el]||elColors.default;
        const ag=c.createRadialGradient(ax-ar*.3,ay-ar*.3,0,ax,ay,ar);
        ag.addColorStop(0,'white');ag.addColorStop(0.3,ec);ag.addColorStop(1,'#000');
        c.beginPath();c.arc(ax,ay,ar,0,Math.PI*2);
        c.fillStyle=ag;c.shadowColor=ec;c.shadowBlur=12;c.fill();
        c.strokeStyle='rgba(255,255,255,0.3)';c.lineWidth=1;c.stroke();
        // Label
        if(at.el){
          c.font=`bold ${ar*1.1}px Arial`;c.fillStyle='white';
          c.textAlign='center';c.textBaseline='middle';c.shadowBlur=0;
          c.fillText(at.el,ax,ay);
        }
      });
      break;
    }

    case 'beaker':{
      // Conical flask / beaker
      const bw=ow,bh=oh;
      // Body
      c.beginPath();c.moveTo(-bw*.35,-bh*.5);c.lineTo(-bw*.5,bh*.5);c.lineTo(bw*.5,bh*.5);c.lineTo(bw*.35,-bh*.5);c.closePath();
      c.fillStyle=fill==='none'?'rgba(100,200,255,0.15)':fill;c.fill();
      c.strokeStyle=stroke;c.lineWidth=lw;c.stroke();
      // Neck
      c.fillStyle='rgba(100,200,255,0.1)';
      c.strokeStyle=stroke;
      c.beginPath();c.rect(-bw*.15,-bh*.7,bw*.3,bh*.22);c.fill();c.stroke();
      // Liquid
      const liqH=obj.liquidLevel||0.4;
      c.save();c.beginPath();c.moveTo(-bw*.35,-bh*.5);c.lineTo(-bw*.5,bh*.5);c.lineTo(bw*.5,bh*.5);c.lineTo(bw*.35,-bh*.5);c.closePath();c.clip();
      const ly=bh*.5-bh*liqH;
      const lg=c.createLinearGradient(0,ly,0,bh*.5);
      lg.addColorStop(0,obj.liquidColor||'rgba(0,255,136,0.6)');
      lg.addColorStop(1,obj.liquidColor||'rgba(0,180,80,0.8)');
      c.fillStyle=lg;c.fillRect(-bw,ly,bw*2,bh);
      c.restore();
      // Bubbles
      if(obj.bubbling){
        for(let b=0;b<4;b++){
          const bx=(Math.sin(Date.now()/400+b*2.5)*bw*.3);
          const by=-bh*.3+((Date.now()/300+b*0.9)%1)*bh*.7;
          c.beginPath();c.arc(bx,by,bh*.025,0,Math.PI*2);
          c.fillStyle='rgba(200,255,220,0.5)';c.fill();
        }
        requestAnimationFrame(drawWorld);
      }
      break;
    }

    case 'flask':{
      // Erlenmeyer flask
      c.beginPath();
      c.moveTo(-ow*.1,-oh*.5);c.lineTo(-ow*.1,-oh*.1);
      c.lineTo(-ow*.5,oh*.5);c.lineTo(ow*.5,oh*.5);
      c.lineTo(ow*.1,-oh*.1);c.lineTo(ow*.1,-oh*.5);c.closePath();
      c.fillStyle=fill==='none'?'rgba(100,200,255,0.12)':fill;c.fill();
      c.strokeStyle=stroke;c.lineWidth=lw;c.stroke();
      if(obj.liquid){
        c.save();c.beginPath();
        c.moveTo(-ow*.1,-oh*.1);c.lineTo(-ow*.5,oh*.5);c.lineTo(ow*.5,oh*.5);c.lineTo(ow*.1,-oh*.1);c.closePath();
        c.clip();
        const lfg=c.createLinearGradient(0,-oh*.1,0,oh*.5);
        lfg.addColorStop(0,obj.liquidColor||'rgba(0,255,100,0.4)');
        lfg.addColorStop(1,obj.liquidColor||'rgba(0,150,60,0.7)');
        c.fillStyle=lfg;c.fill();c.restore();
      }
      break;
    }

    case 'dna':{
      // Double helix
      const tw=ow*.5,th=oh*.5;
      const steps=40;
      c.lineWidth=lw+1;
      // Strand 1
      c.beginPath();
      for(let i=0;i<=steps;i++){
        const t=i/steps,y=-th+t*oh,x=Math.sin(t*Math.PI*4)*tw;
        i===0?c.moveTo(x,y):c.lineTo(x,y);
      }
      c.strokeStyle=fill||'#00ff88';c.stroke();
      // Strand 2
      c.beginPath();
      for(let i=0;i<=steps;i++){
        const t=i/steps,y=-th+t*oh,x=Math.sin(t*Math.PI*4+Math.PI)*tw;
        i===0?c.moveTo(x,y):c.lineTo(x,y);
      }
      c.strokeStyle=stroke||'#00ccff';c.stroke();
      // Rungs
      c.lineWidth=1;c.strokeStyle='rgba(200,255,200,0.4)';
      for(let i=0;i<=steps;i+=3){
        const t=i/steps,y=-th+t*oh;
        const x1=Math.sin(t*Math.PI*4)*tw,x2=Math.sin(t*Math.PI*4+Math.PI)*tw;
        c.beginPath();c.moveTo(x1,y);c.lineTo(x2,y);c.stroke();
      }
      break;
    }

    case 'tree':{
      // Fractal-ish tree
      function branch(x,y,len,angle,depth){
        if(depth===0||len<3)return;
        const ex=x+Math.cos(angle)*len,ey=y+Math.sin(angle)*len;
        c.beginPath();c.moveTo(x,y);c.lineTo(ex,ey);
        c.strokeStyle=depth<2?`rgba(0,${100+depth*40},0,0.9)`:(fill||'#4a8a2a');
        c.lineWidth=Math.max(0.5,depth*0.8);c.stroke();
        branch(ex,ey,len*.72,angle-.42,depth-1);
        branch(ex,ey,len*.72,angle+.42,depth-1);
        if(depth===1){c.beginPath();c.arc(ex,ey,3,0,Math.PI*2);c.fillStyle='rgba(0,200,80,0.7)';c.fill();}
      }
      branch(0,oh*.5,-oh,-Math.PI/2,obj.depth||7);
      break;
    }

    case 'planet':{
      // Planet with rings
      const pr=or_;
      const pGrad=c.createRadialGradient(-pr*.3,-pr*.3,0,0,0,pr);
      pGrad.addColorStop(0,obj.lightColor||'#ffffff');
      pGrad.addColorStop(0.4,fill||'#4488ff');
      pGrad.addColorStop(1,obj.darkColor||'#001133');
      c.beginPath();c.arc(0,0,pr,0,Math.PI*2);
      c.fillStyle=pGrad;c.shadowColor=fill||'#4488ff';c.shadowBlur=24;c.fill();
      // Ring
      if(obj.ring){
        c.save();c.rotate(0.4);
        c.beginPath();c.ellipse(0,0,pr*1.9,pr*0.42,0,0,Math.PI*2);
        c.strokeStyle=`rgba(200,180,120,0.55)`;c.lineWidth=pr*0.22;c.stroke();
        c.restore();
      }
      // Surface detail
      const detail=obj.detail||3;
      for(let i=0;i<detail;i++){
        c.beginPath();c.arc(pr*Math.sin(i*2.4)*0.5,pr*Math.cos(i*1.7)*0.4,pr*0.18,0,Math.PI*2);
        c.fillStyle=`rgba(0,0,0,0.18)`;c.fill();
      }
      break;
    }

    case 'building':{
      // Building with windows
      c.fillStyle=fill||'#1a2a3a';
      c.strokeStyle=stroke||'#4488aa';
      c.lineWidth=lw;
      rr2(c,-ow/2,-oh/2,ow,oh,4);c.fill();c.stroke();
      // Windows grid
      const wCols=obj.cols||3,wRows=obj.rows||5;
      const ww=ow/(wCols*1.8),wh=oh/(wRows*1.8);
      for(let r=0;r<wRows;r++){for(let cl=0;cl<wCols;cl++){
        const wx=-ow/2+ow*(cl+0.5)/wCols-ww/2;
        const wy=-oh/2+oh*(r+0.5)/wRows-wh/2;
        const lit=Math.random()>0.3;
        c.fillStyle=lit?(obj.windowColor||'rgba(255,220,80,0.8)'):'rgba(20,40,60,0.8)';
        c.shadowColor=lit?'rgba(255,200,0,0.6)':'transparent';c.shadowBlur=lit?6:0;
        rr2(c,wx,wy,ww,wh,1);c.fill();
      }}
      break;
    }

    case 'mountain':{
      const peaks=obj.peaks||[[0.5,0],[0.25,0.6],[0.75,0.6],[0,1],[1,1]];
      c.beginPath();
      peaks.forEach((p,i)=>{const px=(p[0]-0.5)*ow,py=(p[1]-0.5)*oh;i===0?c.moveTo(px,py):c.lineTo(px,py);});
      c.closePath();
      const mg=c.createLinearGradient(0,-oh/2,0,oh/2);
      mg.addColorStop(0,obj.peakColor||'#ffffff');mg.addColorStop(0.3,fill||'#666677');mg.addColorStop(1,obj.baseColor||'#334433');
      c.fillStyle=mg;c.fill();c.strokeStyle=stroke;c.lineWidth=lw;c.stroke();
      break;
    }

    case 'water':{
      // Animated wave
      const ww2=ow,wh2=oh;
      c.beginPath();
      c.moveTo(-ww2/2,0);
      const wsteps=30;
      for(let i=0;i<=wsteps;i++){
        const t=i/wsteps;
        const wx=-ww2/2+t*ww2;
        const wy=Math.sin(t*Math.PI*3+(Date.now()/600))*wh2*.2+Math.sin(t*Math.PI*5+(Date.now()/400))*wh2*.1;
        c.lineTo(wx,wy);
      }
      c.lineTo(ww2/2,wh2/2);c.lineTo(-ww2/2,wh2/2);c.closePath();
      const wg=c.createLinearGradient(0,-wh2*.2,0,wh2*.5);
      wg.addColorStop(0,fill||'rgba(0,120,255,0.7)');wg.addColorStop(1,'rgba(0,40,120,0.9)');
      c.fillStyle=wg;c.fill();c.strokeStyle='rgba(100,200,255,0.5)';c.lineWidth=1.5;c.stroke();
      requestAnimationFrame(drawWorld);
      break;
    }

    case 'fire':{
      const ft=Date.now()/200;
      for(let fl=0;fl<8;fl++){
        const fh=or_*(0.5+Math.sin(ft+fl*0.8)*0.3);
        const fx=Math.sin(ft*0.7+fl)*or_*0.25;
        const fg=c.createRadialGradient(fx,-fh*.3,0,fx,-fh*.5,fh);
        fg.addColorStop(0,'rgba(255,255,200,0.9)');fg.addColorStop(0.3,'rgba(255,120,0,0.7)');fg.addColorStop(1,'rgba(255,0,0,0)');
        c.beginPath();c.ellipse(fx,-fh*.4,or_*.2,fh*.5,0,0,Math.PI*2);
        c.fillStyle=fg;c.shadowColor='#ff4400';c.shadowBlur=20;c.fill();
      }
      requestAnimationFrame(drawWorld);break;
    }

    case 'lightning':{
      const pts2=[];let lx=0,ly=-oh/2;
      while(ly<oh/2){
        lx+=(Math.random()-.5)*ow*.5;
        ly+=oh*.1+Math.random()*oh*.1;
        pts2.push([lx,ly]);
      }
      c.beginPath();c.moveTo(0,-oh/2);
      pts2.forEach(p=>c.lineTo(p[0],p[1]));
      c.strokeStyle='#ffffff';c.lineWidth=3;c.shadowColor='#aaaaff';c.shadowBlur=20;c.stroke();
      c.strokeStyle='rgba(150,150,255,0.4)';c.lineWidth=8;c.stroke();
      break;
    }

    case 'robot':{
      // Cute simplified robot
      const rw=ow,rh=oh;
      // Body
      c.fillStyle=fill||'#2a3a4a';c.strokeStyle=stroke||'#4488cc';c.lineWidth=lw;
      rr2(c,-rw*.35,-rh*.1,rw*.7,rh*.55,6);c.fill();c.stroke();
      // Head
      rr2(c,-rw*.25,-rh*.5,rw*.5,rh*.38,8);c.fill();c.stroke();
      // Eyes
      c.fillStyle='#00ffff';c.shadowColor='#00ffff';c.shadowBlur=10;
      c.beginPath();c.arc(-rw*.1,-rh*.33,rw*.07,0,Math.PI*2);c.fill();
      c.beginPath();c.arc(rw*.1,-rh*.33,rw*.07,0,Math.PI*2);c.fill();
      // Mouth
      c.strokeStyle='#00ffff';c.lineWidth=2;
      c.beginPath();c.arc(0,-rh*.2,rw*.1,0.3,Math.PI-.3);c.stroke();
      // Antenna
      c.strokeStyle=stroke||'#4488cc';c.lineWidth=2;
      c.beginPath();c.moveTo(0,-rh*.5);c.lineTo(0,-rh*.65);c.stroke();
      c.beginPath();c.arc(0,-rh*.65,rw*.04,0,Math.PI*2);c.fillStyle='#ff4444';c.fill();
      // Arms
      rr2(c,-rw*.55,-rh*.05,rw*.18,rh*.3,4);c.fill();c.stroke();
      rr2(c, rw*.37,-rh*.05,rw*.18,rh*.3,4);c.fill();c.stroke();
      // Legs
      rr2(c,-rw*.25,rh*.45,rw*.2,rh*.22,4);c.fill();c.stroke();
      rr2(c, rw*.05,rh*.45,rw*.2,rh*.22,4);c.fill();c.stroke();
      break;
    }

    case 'compound':
      (obj.children||[]).forEach(ch=>{ctx.save();renderObj(ch);ctx.restore();});
      break;

    case 'house':{
      const hw=ow,hh=oh;
      // Walls
      c.fillStyle=fill||'#c8a87a';c.strokeStyle=stroke||'#8a6040';c.lineWidth=lw;
      rr2(c,-hw/2,0,hw,hh*.6,3);c.fill();c.stroke();
      // Roof (triangle)
      c.beginPath();c.moveTo(-hw*.58,-hh*.02);c.lineTo(0,-hh*.48);c.lineTo(hw*.58,-hh*.02);c.closePath();

      // Mast
      c.strokeStyle='#8a6040';c.lineWidth=3;
      c.beginPath();c.moveTo(btw*.05,-bth*.06);c.lineTo(btw*.05,-bth*.65);c.stroke();
      // Sail
      c.beginPath();c.moveTo(btw*.05,-bth*.62);c.lineTo(btw*.45,-bth*.35);c.lineTo(btw*.05,-bth*.15);c.closePath();
      c.fillStyle=obj.sailColor||'rgba(255,255,240,0.9)';c.fill();c.strokeStyle='#ccc';c.lineWidth=1;c.stroke();
      // Wake waves
      if(obj.moving){
        for(let w=0;w<3;w++){
          c.beginPath();c.moveTo(-btw*.5-w*btw*.15,bth*.2+w*bth*.08);
          c.quadraticCurveTo(-btw*.7-w*btw*.1,bth*.35+w*bth*.05,-btw*.9-w*btw*.15,bth*.2+w*bth*.08);
          c.strokeStyle=`rgba(180,220,255,${0.4-w*.1})`;c.lineWidth=2;c.stroke();
        }
      }
      break;
    }

    case 'car':{
      const crw=ow,crh=oh;
      // Body
      rr2(c,-crw/2,0,crw,crh*.5,crh*.08);
      c.fillStyle=fill||'#cc2222';c.fill();c.strokeStyle=stroke||'#881111';c.lineWidth=lw;c.stroke();
      // Roof
      c.beginPath();c.moveTo(-crw*.28,0);c.lineTo(-crw*.35,-crh*.4);c.lineTo(crw*.28,-crh*.4);c.lineTo(crw*.32,0);c.closePath();
      c.fillStyle=fill||'#cc2222';c.fill();c.strokeStyle=stroke||'#881111';c.stroke();
      // Windows
      c.fillStyle='rgba(180,220,255,0.7)';
      rr2(c,-crw*.3,-crh*.37,crw*.25,crh*.3,3);c.fill();
      rr2(c, crw*.04,-crh*.37,crw*.22,crh*.3,3);c.fill();
      // Wheels
      [[-crw*.3,crh*.46],[crw*.25,crh*.46]].forEach(([wx,wy])=>{
        c.beginPath();c.arc(wx,wy,crh*.22,0,Math.PI*2);
        c.fillStyle='#222';c.fill();c.strokeStyle='#555';c.lineWidth=2;c.stroke();
        c.beginPath();c.arc(wx,wy,crh*.1,0,Math.PI*2);c.fillStyle='#888';c.fill();
      });
      // Headlights
      c.fillStyle='rgba(255,240,150,0.8)';c.shadowColor='rgba(255,220,0,0.6)';c.shadowBlur=8;
      c.beginPath();c.ellipse(crw*.43,crh*.15,crh*.07,crh*.05,0,0,Math.PI*2);c.fill();
      c.beginPath();c.ellipse(-crw*.43,crh*.15,crh*.07,crh*.05,0,0,Math.PI*2);c.fillStyle='rgba(255,100,80,0.8)';c.fill();
      break;
    }

    case 'bird':{
      const brdw=ow,brdh=oh;
      const t3=Date.now()/300;
      const flap=Math.sin(t3)*0.5;
      // Body
      c.beginPath();c.ellipse(0,0,brdw*.35,brdh*.25,0,0,Math.PI*2);
      c.fillStyle=fill||'#2a2a2a';c.fill();
      // Wings
      c.save();c.translate(-brdw*.2,0);c.rotate(-0.3+flap);
      c.beginPath();c.ellipse(-brdw*.2,0,brdw*.38,brdh*.12,-.2,0,Math.PI*2);
      c.fillStyle=fill||'#2a2a2a';c.fill();c.restore();
      c.save();c.translate(brdw*.2,0);c.rotate(0.3-flap);
      c.beginPath();c.ellipse(brdw*.2,0,brdw*.38,brdh*.12,.2,0,Math.PI*2);
      c.fillStyle=fill||'#2a2a2a';c.fill();c.restore();
      // Head
      c.beginPath();c.arc(brdw*.28,-brdh*.1,brdh*.18,0,Math.PI*2);c.fillStyle=fill||'#2a2a2a';c.fill();
      // Beak
      c.beginPath();c.moveTo(brdw*.43,-brdh*.1);c.lineTo(brdw*.58,-brdh*.08);c.lineTo(brdw*.43,-brdh*.04);c.closePath();
      c.fillStyle='#e8a020';c.fill();
      // Eye
      c.beginPath();c.arc(brdw*.35,-brdh*.14,brdh*.05,0,Math.PI*2);c.fillStyle='white';c.fill();
      c.beginPath();c.arc(brdw*.37,-brdh*.14,brdh*.03,0,Math.PI*2);c.fillStyle='#111';c.fill();
      requestAnimationFrame(drawWorld);break;
    }

    case 'rainbow':{
      const rbw=ow,rbh=oh;
      const colors=['#ff0000','#ff8800','#ffee00','#00cc00','#0066ff','#8800ff'];
      colors.forEach((col,i)=>{
        const rr3=(0.9-i*.12)*rbw/2,rth=rbh*(0.06+i*.02);
        c.beginPath();c.arc(0,rbh*.2,rr3,Math.PI,0);
        c.strokeStyle=col;c.lineWidth=rth;c.globalAlpha=0.7;c.stroke();c.globalAlpha=1;
      });
      break;
    }

    case 'snow':{
      // Snow field
      const sw=ow,sh2=oh;
      const sg2=c.createLinearGradient(0,-sh2/2,0,sh2/2);
      sg2.addColorStop(0,'#f0f4ff');sg2.addColorStop(1,'#d8e4f8');
      c.fillStyle=sg2;c.fillRect(-sw/2,-sh2/2,sw,sh2);
      // Snowflakes
      const sft=Date.now()/2000;
      for(let sf=0;sf<20;sf++){
        const sx2=(Math.sin(sf*2.3+sft)*0.4)*sw;
        const sy2=(-sh2/2+(sf*sh2/20+sft*sh2*.1)%sh2);
        c.beginPath();c.arc(sx2,sy2,sw*.015,0,Math.PI*2);
        c.fillStyle='rgba(200,220,255,0.8)';c.fill();
      }
      requestAnimationFrame(drawWorld);break;
    }

    case 'desert':{
      const dw=ow,dh=oh;
      const dg=c.createLinearGradient(0,-dh/2,0,dh/2);
      dg.addColorStop(0,'#e8c878');dg.addColorStop(0.5,fill||'#d4a84a');dg.addColorStop(1,'#c89030');
      c.fillStyle=dg;c.fillRect(-dw/2,-dh/2,dw,dh);
      // Dunes
      for(let d2=0;d2<3;d2++){
        const dy2=dh*(-.1+d2*.25);
        c.beginPath();c.moveTo(-dw/2,dy2);
        c.bezierCurveTo(-dw*.2,dy2-dh*.15,dw*.1,dy2-dh*.08,dw*.4,dy2);
        c.bezierCurveTo(dw*.55,dy2+dh*.05,dw*.7,dy2+dh*.02,dw/2,dy2);
        c.fillStyle=`rgba(180,140,40,${0.2+d2*.1})`;c.fill();
      }
      // Cactus
      if(obj.cactus!==false){
        c.fillStyle='#4a8a18';c.strokeStyle='#2a6010';c.lineWidth=1.5;
        rr2(c,-dw*.05,-dh*.35,dw*.1,dh*.45,dw*.04);c.fill();c.stroke();
        rr2(c,-dw*.16,-dh*.2,dw*.09,dh*.15,dw*.04);c.fill();c.stroke();
        rr2(c, dw*.07,-dh*.22,dw*.09,dh*.15,dw*.04);c.fill();c.stroke();
      }
      break;
    }

    default:{
      c.beginPath();c.arc(0,0,or_*.5,0,Math.PI*2);
      c.fillStyle=fill==='none'?'rgba(0,255,136,0.2)':fill;
      c.strokeStyle=stroke;c.lineWidth=lw;c.fill();c.stroke();
      if(obj.label){
        c.font=`bold ${or_*.45}px "Courier New"`;c.fillStyle=stroke;
        c.textAlign='center';c.textBaseline='middle';c.shadowBlur=8;
        c.fillText((obj.label||'').slice(0,4),0,0);
      }
    }
  }
}

// Helper: rounded rect path
function rr2(c,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  c.beginPath();c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();
}
function poly(c,pts,fill,stroke,lw){
  c.beginPath();pts.forEach((p,i)=>i===0?c.moveTo(p[0],p[1]):c.lineTo(p[0],p[1]));c.closePath();
  if(fill!=='none'){c.fillStyle=fill;c.fill();}
  c.strokeStyle=stroke;c.lineWidth=lw;c.stroke();
}

// ─── KEITH FACE ICON ────────────────────────────────
function drawKeithFace(){
  const fc=document.getElementById('g-keith-face');
  const c=fc.getContext('2d');
  c.clearRect(0,0,64,64);
  c.fillStyle='#050f05';c.beginPath();c.arc(32,32,31,0,Math.PI*2);c.fill();
  c.strokeStyle='#00aa44';c.lineWidth=2;c.beginPath();c.arc(32,32,31,0,Math.PI*2);c.stroke();
  // Mini Keith
  const cx=32,cy=35,s=0.48;
  function ov(dx,dy,rx,ry,fill){c.beginPath();c.ellipse(cx+dx*s,cy+dy*s,rx*s,ry*s,0,0,Math.PI*2);c.fillStyle=fill;c.fill();}
  ov(0,-10,44,52,'#3a1f0a');ov(-50,-8,8,10,'#3a1f0a');ov(50,-8,8,10,'#3a1f0a');
  ov(-20,-14,5,5,'#111');ov(20,-14,5,5,'#111');ov(-22,-16,2.5,2.5,'white');ov(18,-16,2.5,2.5,'white');
  for(const yl of[-40,-33,-26]){c.beginPath();c.moveTo(cx-15*s,cy+yl*s);c.lineTo(cx+15*s,cy+yl*s);c.strokeStyle='#1e0f00';c.lineWidth=s;c.stroke();}
  c.beginPath();c.moveTo(cx-36*s,cy-22*s);c.lineTo(cx-12*s,cy-26*s);c.strokeStyle='#0a0000';c.lineWidth=3*s;c.lineCap='round';c.stroke();
  c.beginPath();c.moveTo(cx+12*s,cy-26*s);c.lineTo(cx+36*s,cy-22*s);c.strokeStyle='#0a0000';c.lineWidth=3*s;c.stroke();
  ov(0,8,5,7,'#1e0f00');
  c.beginPath();c.ellipse(cx,cy+18*s,18*s,8*s,0,Math.PI,Math.PI*2);c.fillStyle='#0a0000';c.fill();
  ov(0,32,16,14,'#0a0000');
  c.beginPath();c.ellipse(cx,cy+26*s,8*s,5*s,0,Math.PI,Math.PI*2);c.fillStyle='#aa7744';c.fill();
}

// ═══════════════════════════════════════════
// AI GENERATION
// ═══════════════════════════════════════════
async function gSend(){
  const inp=document.getElementById('g-inp');
  const p=inp.value.trim();if(!p||gSending)return;
  inp.value='';await gGenerate(p);
}
async function gGenerate(prompt){
  if(gSending)return;
  gSending=true;
  document.getElementById('g-send').disabled=true;
  document.getElementById('g-thinking').classList.add('on');
  setStat('Keith is creating...');
  addMsg(prompt,'u');gChat.push({role:'u',content:prompt});

  try{
    const history=gChat.slice(-6).map(m=>({role:m.role==='k'?'assistant':'user',content:m.content}));
    const sys=`You are Keith GPT, God of the Greenium ${gDim} world called "${gWorldName}". Respond in-character AND generate scene objects.

RESPOND ONLY with valid JSON (no markdown):
{"speech":"Keith 1-2 sentence calm old-man response","objects":[...]}

WORLD-BUILDING TYPES:
house:x,y,w,h,fill,stroke,roofColor,doorColor,windows(2-4),windowLit,chimney,smoke
ocean:x,y,w,h,fill  lake:x,y,w,h,fill  river:x,y,w,h,fill  island:x,y,w,h,fill
cloud:x,y,w,h,fill,stormy(bool)  sun:x,y,r,rays(8-16)  moon:x,y,r,crescent(bool)
hill:x,y,w,h,fill,stroke,baseColor  mountain:x,y,w,h,fill,stroke,peakColor,baseColor
grass:x,y,w,h,fill  forest:x,y,w,h,fill,count(3-12),trunkColor
tree:x,y,w,h,fill,depth(3-7)  road:x,y,w,h,fill,stroke
bridge:x,y,w,h,fill,stroke  fence:x,y,w,h,fill,stroke,posts(4-12)
volcano:x,y,w,h,fill,erupting(bool)  castle:x,y,w,h,fill,stroke,flagColor
windmill:x,y,w,h,fill,stroke  boat:x,y,w,h,fill,stroke,sailColor,moving(bool)
car:x,y,w,h,fill,stroke  bird:x,y,w,h,fill  rainbow:x,y,w,h
snow:x,y,w,h  desert:x,y,w,h,fill,cactus(bool)
building:x,y,w,h,fill,stroke,cols(2-5),rows(3-8),windowColor

SCIENCE TYPES:
atom:x,y,r,fill,stroke,orbits(1-4)  molecule:x,y,atoms:[{x,y,el,r}],bonds:[[i,j]]
beaker:x,y,w,h,fill,liquidLevel(0-1),liquidColor,bubbling  flask:x,y,w,h,fill,liquid,liquidColor
dna:x,y,w,h,fill,stroke  planet:x,y,r,fill,ring(bool),detail(1-5)
fire:x,y,r  lightning:x,y,w,h  robot:x,y,w,h,fill,stroke  water:x,y,w,h,fill

SHAPES: circle,rect,ellipse,triangle,polygon(sides),star(sides),text(text,fontSize 0.02-0.1,color),line(points),bezier(points),compound(children:[])

COORDINATES: x,y,w,h,r all 0.0-1.0 fractions of canvas. angle=radians. x=0 left,x=1 right,y=0 top,y=1 bottom.

RULES:
- Generate 6-14 objects for rich layered scenes
- ${gDim==='3d'?'3D: sky y=0-0.45, horizon y=0.45-0.55, ground y=0.55-1.0. Far objects smaller+higher, near objects larger+lower.':'2D: background first (sky/grass/water rect covering canvas), then mid, then foreground.'}
- BUILD COMPLETE SCENES: house prompt = grass + road + house + fence + trees + clouds + sun
- Use REALISTIC colors: sky=blue, grass=green, water=blue, sand=tan. NOT green for everything
- Always include a background rect covering x:0.5,y:0.5,w:1.0,h:1.0
- For chemistry mention electron gangsta for high-EN elements (F,O,N,Cl)`;

    const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:sys},...history,{role:'user',content:prompt}],max_tokens:1800,temperature:0.88})});
    if(!res.ok)throw new Error('API '+res.status);
    const data=await res.json();
    const raw=data.choices[0].message.content.trim().replace(/```json|```/g,'').trim();

    // Find JSON boundaries robustly
    const start=raw.indexOf('{'),end=raw.lastIndexOf('}');
    const parsed=JSON.parse(raw.slice(start,end+1));

    const speech=parsed.speech||'My man, it is done.';
    const objs=parsed.objects||[];
    objs.forEach(o=>{gObjects.push(o);});
    drawWorld();
    addMsg(speech,'k');gChat.push({role:'k',content:speech});
    speak(speech);setStat('✓ Created!');

  }catch(e){
    console.error(e);
    addMsg('My man, I had some trouble with that one. Try describing it differently.','k');
    setStat('Error — try again');
  }

  gSending=false;
  document.getElementById('g-send').disabled=false;
  document.getElementById('g-thinking').classList.remove('on');
  setTimeout(()=>setStat(''),3000);
}

function addMsg(text,who){
  const chat=document.getElementById('g-chat');
  const d=document.createElement('div');d.className='gm '+who;
  d.textContent=(who==='k'?'Keith: ':who==='u'?'You: ':'')+text;
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
function setStat(m){document.getElementById('g-stat').textContent=m;}
function clearWorld(){gObjects=[];drawWorld();addMsg('Canvas cleared. Tell me what to build.','k');}

// ═══════════════════════════════════════════
// SPEECH
// ═══════════════════════════════════════════
function speak(t){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  const v=window.speechSynthesis.getVoices();
  const pick=v.find(x=>x.name.includes('Alex')||x.name.includes('Fred')||x.lang.startsWith('en'))||null;
  if(pick)u.voice=pick;u.rate=0.78;u.pitch=0.85;u.volume=1;
  window.speechSynthesis.speak(u);
}
window.speechSynthesis&&(window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices());

// ═══════════════════════════════════════════
// SAVE / LOAD / BACK
// ═══════════════════════════════════════════
function saveClose(){
  const d=getSW();
  d[gWorldKey]={name:gWorldName,dim:gDim,objects:gObjects,chat:gChat,ts:Date.now()};
  setSW(d);addMsg('World saved!','s');setStat('✓ Saved');setTimeout(()=>setStat(''),2000);
}
function goBack(){window.location.href='index.html';}
function getSW(){return JSON.parse(localStorage.getItem('gw_'+(gUser?.key||'g'))||'{}');}
function setSW(d){localStorage.setItem('gw_'+(gUser?.key||'g'),JSON.stringify(d));}
</script>
