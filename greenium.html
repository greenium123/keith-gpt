<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Greenium</title>
<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#000;font-family:'Courier New',monospace;height:100dvh;overflow:hidden;display:flex;flex-direction:column;color:#e0f0ff}

/* LOADER */
#g-loader{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 1s ease}
#g-loader.out{opacity:0;pointer-events:none}
#g-pts{position:absolute;inset:0;overflow:hidden}
.gpt{position:absolute;border-radius:50%;animation:gFl linear infinite}
@keyframes gFl{0%{transform:translateY(100vh) scale(0);opacity:0}20%{opacity:1}80%{opacity:1}100%{transform:translateY(-20vh) scale(1);opacity:0}}
#g-atom{font-size:52px;animation:gSpin 3s linear infinite;margin-bottom:16px}
@keyframes gSpin{to{transform:rotate(360deg)}}
#g-ltitle{font-size:clamp(52px,15vw,100px);font-weight:900;color:#00ff88;letter-spacing:10px;text-shadow:0 0 40px #00ff88,0 0 80px #00cc66;opacity:0;transform:scale(0.4);transition:all 1s cubic-bezier(.17,.67,.35,1.3)}
#g-ltitle.show{opacity:1;transform:scale(1)}
#g-lsub{font-size:clamp(11px,3vw,16px);color:#00cc66;letter-spacing:5px;margin-top:10px;opacity:0;transition:opacity .8s ease .7s}
#g-lsub.show{opacity:1}
#g-lbarw{margin-top:36px;width:200px;height:4px;background:#0a1a0a;border-radius:2px;overflow:hidden}
#g-lbar{height:100%;width:0%;background:linear-gradient(90deg,#00ff88,#00cc44);transition:width 2.6s cubic-bezier(.4,0,.2,1)}

/* SETUP */
#g-setup{display:none;position:fixed;inset:0;background:linear-gradient(160deg,#000,#050f05 60%,#000);flex-direction:column;align-items:center;padding:24px;overflow-y:auto;-webkit-overflow-scrolling:touch}
#g-setup.on{display:flex}
.gs-t{font-size:clamp(20px,5vw,32px);font-weight:bold;color:#00ff88;text-shadow:0 0 16px #00ff88;margin-bottom:4px;text-align:center;letter-spacing:3px;padding-top:16px}
.gs-s{color:#00aa55;font-size:12px;margin-bottom:28px;text-align:center}
.gs-g{width:100%;max-width:400px;margin-bottom:18px}
.gs-l{font-size:11px;color:#00cc66;letter-spacing:2px;margin-bottom:7px;display:block}
.gs-i{width:100%;background:#050f05;color:#00ff88;border:1.5px solid #00aa44;border-radius:10px;padding:12px 14px;font-family:'Courier New',monospace;font-size:14px;outline:none;-webkit-appearance:none}
.gs-i:focus{border-color:#00ff88}
.gs-i::placeholder{color:#1a4a2a}
.dr{display:flex;gap:10px}
.db{flex:1;padding:14px;border:2px solid #00aa44;border-radius:10px;background:transparent;color:#00cc66;font-family:'Courier New',monospace;font-size:14px;font-weight:bold;cursor:pointer;transition:all .2s}
.db.sel{background:#00aa44;color:#000;box-shadow:0 0 14px #00ff88}
#g-begin{width:100%;max-width:400px;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#00cc66,#009944);color:#000;font-family:'Courier New',monospace;font-size:15px;font-weight:bold;cursor:pointer;letter-spacing:2px;box-shadow:0 0 20px rgba(0,255,136,.35);margin-top:6px}
.sw-s{width:100%;max-width:400px;margin-bottom:18px}
.sw-h{font-size:10px;color:#00aa55;letter-spacing:2px;margin-bottom:7px}
.sw-i{background:#050f05;border:1px solid #00aa44;border-radius:8px;padding:9px 12px;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.sw-n{color:#00ff88;font-size:12px;font-weight:bold}
.sw-m{color:#00aa44;font-size:9px;margin-top:1px}
.sw-op{color:#00ff88;font-size:11px;cursor:pointer;padding:3px 8px;border:1px solid #00aa44;border-radius:5px}
.sw-dl{color:#e74c3c;font-size:11px;cursor:pointer;padding:3px 8px;border:1px solid #e74c3c;border-radius:5px;margin-left:4px}

/* MAIN */
#g-main{display:none;position:fixed;inset:0;flex-direction:column;background:#000}
#g-main.on{display:flex}
#g-hdr{background:#020a02;border-bottom:2px solid #00aa44;padding:7px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:10}
#g-hname{color:#00ff88;font-size:12px;font-weight:bold;letter-spacing:1px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#g-dbadge{background:#00aa44;color:#000;font-size:9px;font-weight:bold;padding:2px 6px;border-radius:4px}
.ghb{background:#050f05;color:#00cc66;border:1px solid #00aa44;border-radius:7px;padding:5px 9px;font-family:'Courier New',monospace;font-size:9px;cursor:pointer;white-space:nowrap}
.ghb:active{background:#0a1a0a}

/* BODY */
#g-body{flex:1;display:flex;min-height:0;overflow:hidden;position:relative}
#g-3d-wrap{flex:1;position:relative;overflow:hidden;touch-action:none}
#g-3d-canvas{display:block;width:100%;height:100%}

/* 2D canvas wrap */
#g-2d-wrap{flex:1;position:relative;overflow:hidden;touch-action:none;display:none}
#g-2d-canvas{display:block;width:100%;height:100%}

/* Toolbar */
#g-toolbar{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:5;pointer-events:all}
.gtb{background:rgba(5,15,5,.9);color:#00cc66;border:1.5px solid #00aa44;border-radius:8px;padding:7px 12px;font-family:'Courier New',monospace;font-size:10px;cursor:pointer;backdrop-filter:blur(8px);white-space:nowrap}
.gtb:active{background:#0a2a0a}
#g-hint{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:rgba(0,255,136,.7);font-size:9px;padding:4px 12px;border-radius:10px;pointer-events:none;white-space:nowrap;transition:opacity 1s;z-index:5}

/* Think overlay */
#g-think{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.65);z-index:8;pointer-events:none}
#g-think.on{display:flex}
#g-thtxt{color:#00ff88;font-size:14px;font-weight:bold;letter-spacing:3px;animation:gPulse 1s ease-in-out infinite}
@keyframes gPulse{0%,100%{opacity:1;text-shadow:0 0 10px #00ff88}50%{opacity:.3;text-shadow:none}}

/* SIDE */
#g-side{width:min(42%,220px);background:#020a02;border-left:2px solid #00aa44;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;z-index:2}
@media(max-width:560px){#g-body{flex-direction:column}#g-side{width:100%;height:185px;border-left:none;border-top:2px solid #00aa44;flex-direction:row}}
#g-kbox{padding:10px;display:flex;flex-direction:column;align-items:center;border-bottom:1px solid #0a2a0a;flex-shrink:0}
@media(max-width:560px){#g-kbox{border-bottom:none;border-right:1px solid #0a2a0a;width:78px;justify-content:center;flex-shrink:0}}
#g-kface{border-radius:50%;border:2px solid #00aa44;box-shadow:0 0 10px rgba(0,255,136,.35);background:#050f05}
.gkn{color:#00cc66;font-size:8px;letter-spacing:2px;margin-top:4px;text-align:center}
#g-chat{flex:1;overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:5px;min-height:0}
#g-chat::-webkit-scrollbar{width:2px}
#g-chat::-webkit-scrollbar-thumb{background:#00aa44;border-radius:1px}
.gm{font-size:10px;line-height:1.5;padding:6px 8px;border-radius:7px;word-break:break-word}
.gm.k{background:#0a1f0a;color:#00ff88;border-left:2px solid #00ff88}
.gm.u{background:#0a1020;color:#aaddff;border-left:2px solid #4488cc}

/* BOTTOM */
#g-bot{background:#020a02;border-top:2px solid #00aa44;padding:9px 12px calc(10px + env(safe-area-inset-bottom));flex-shrink:0;z-index:10}
#g-ir{display:flex;gap:7px;align-items:center}
#g-inp{flex:1;background:#050f05;color:#00ff88;border:1.5px solid #00aa44;border-radius:9px;padding:10px 12px;font-family:'Courier New',monospace;font-size:13px;outline:none;caret-color:#00ff88;-webkit-appearance:none}
#g-inp::placeholder{color:#1a4a2a}
#g-inp:focus{border-color:#00ff88}
#g-send{background:linear-gradient(135deg,#00cc66,#009944);color:#000;border:none;border-radius:9px;padding:10px 14px;font-family:'Courier New',monospace;font-size:13px;font-weight:bold;cursor:pointer;white-space:nowrap}
#g-send:disabled{background:#0a2a0a;color:#1a4a1a}
#g-stat{font-size:9px;color:#00aa44;margin-top:3px;min-height:11px;text-align:center}
</style>
</head>
<body>

<div id="g-loader">
  <div id="g-pts"></div>
  <div id="g-atom">⚗</div>
  <div id="g-ltitle">GREENIUM</div>
  <div id="g-lsub">KEITH BECOMES GOD</div>
  <div id="g-lbarw"><div id="g-lbar"></div></div>
</div>

<div id="g-setup">
  <div class="gs-t">⚗ GREENIUM</div>
  <div class="gs-s">Create your world. Keith will build it.</div>
  <div class="sw-s" id="g-sws" style="display:none">
    <div class="sw-h">📂 SAVED WORLDS</div>
    <div id="g-swl"></div>
  </div>
  <div class="gs-g"><label class="gs-l">🌍 WORLD NAME</label>
    <input class="gs-i" id="g-wname" placeholder="e.g. Earth 2.0, Crystal Planet..." maxlength="40"></div>
  <div class="gs-g"><label class="gs-l">📐 DIMENSION</label>
    <div class="dr">
      <button class="db sel" id="g-b2d" onclick="selDim('2d')">2D</button>
      <button class="db" id="g-b3d" onclick="selDim('3d')">3D</button>
    </div></div>
  <div class="gs-g"><label class="gs-l">✨ FIRST CREATION (optional)</label>
    <input class="gs-i" id="g-fp" placeholder="e.g. Cover it with forests and oceans..." maxlength="200"></div>
  <button id="g-begin" onclick="beginWorld()">⚗ CREATE WORLD →</button>
  <div style="height:24px"></div>
</div>

<div id="g-main">
  <div id="g-hdr">
    <div id="g-hname">World</div>
    <div id="g-dbadge">3D</div>
    <button class="ghb" onclick="saveWorld()">💾 Save</button>
    <button class="ghb" onclick="goBack()">✕ Exit</button>
  </div>
  <div id="g-body">
    <!-- THREE.JS 3D VIEWPORT -->
    <div id="g-3d-wrap">
      <canvas id="g-3d-canvas"></canvas>
      <div id="g-hint">drag · orbit | pinch · zoom | 2-finger · pan</div>
      <div id="g-toolbar">
        <button class="gtb" onclick="resetCam()">⌖ Reset</button>
        <button class="gtb" id="g-spin-btn" onclick="toggleSpin()">⟳ Auto-Spin</button>
        <button class="gtb" onclick="clearScene3D()">🗑 Clear</button>
      </div>
      <div id="g-think"><div id="g-thtxt">⚗ KEITH IS CREATING...</div></div>
    </div>
    <!-- 2D CANVAS (shown when dim=2d) -->
    <div id="g-2d-wrap">
      <canvas id="g-2d-canvas"></canvas>
      <div id="g-toolbar" style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%)">
        <button class="gtb" onclick="resetVP()">⌖ Reset</button>
        <button class="gtb" onclick="clearScene2D()">🗑 Clear</button>
      </div>
      <div id="g-think"><div id="g-thtxt">⚗ KEITH IS CREATING...</div></div>
    </div>
    <div id="g-side">
      <div id="g-kbox">
        <canvas id="g-kface" width="64" height="64"></canvas>
        <div class="gkn">KEITH GPT</div>
      </div>
      <div id="g-chat"></div>
    </div>
  </div>
  <div id="g-bot">
    <div id="g-ir">
      <input id="g-inp" type="text" placeholder="Add to your world..." maxlength="300">
      <button id="g-send" onclick="gSend()">CREATE →</button>
    </div>
    <div id="g-stat"></div>
  </div>
</div>

<script>
const PROXY='https://super-heart-37c5.jadelady1912.workers.dev';
let gUser=null;
try{gUser=JSON.parse(sessionStorage.getItem('greenium_user')||'null');}catch(e){}
if(!gUser){window.location.href='index.html';}

let gDim='3d',gName='',gKey='',gScene=[],gChat=[],gSending=false;

// ═══════════════════════════════════════════════════════
// LOADER
// ═══════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded',()=>{
  spawnPts();
  const T=document.getElementById('g-ltitle'),S=document.getElementById('g-lsub'),B=document.getElementById('g-lbar'),L=document.getElementById('g-loader');
  setTimeout(()=>T.classList.add('show'),200);
  setTimeout(()=>S.classList.add('show'),900);
  setTimeout(()=>B.style.width='100%',300);
  setTimeout(()=>{L.classList.add('out');setTimeout(()=>{L.style.display='none';showSetup();},1000);},3600);
});
function spawnPts(){
  const w=document.getElementById('g-pts'),s=['⚗','⚛','🧪','◆','✦'];
  for(let i=0;i<28;i++){const p=document.createElement('div');p.className='gpt';const sz=6+Math.random()*18;
  p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;background:rgba(0,${140+Math.floor(Math.random()*115)},${40+Math.floor(Math.random()*80)},.3);animation-duration:${3+Math.random()*6}s;animation-delay:${Math.random()*5}s;font-size:${sz*.7}px;display:flex;align-items:center;justify-content:center;color:rgba(0,255,136,.4)`;
  if(Math.random()>.5)p.textContent=s[Math.floor(Math.random()*s.length)];w.appendChild(p);}
}

// ═══════════════════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════════════════
function showSetup(){document.getElementById('g-setup').classList.add('on');loadList();}
function selDim(d){gDim=d;document.getElementById('g-b2d').classList.toggle('sel',d==='2d');document.getElementById('g-b3d').classList.toggle('sel',d==='3d');}
function getSW(){return JSON.parse(localStorage.getItem('gw_'+(gUser?.key||'g'))||'{}');}
function setSW(d){localStorage.setItem('gw_'+(gUser?.key||'g'),JSON.stringify(d));}
function loadList(){
  const sw=getSW(),ks=Object.keys(sw).reverse(),sec=document.getElementById('g-sws');
  if(!ks.length){sec.style.display='none';return;}
  sec.style.display='block';
  const el=document.getElementById('g-swl');el.innerHTML='';
  ks.forEach(k=>{const w=sw[k];const d=document.createElement('div');d.className='sw-i';
  d.innerHTML=`<div style="flex:1"><div class="sw-n">${w.name}</div><div class="sw-m">${(w.dim||'3d').toUpperCase()} · ${(w.scene||[]).length} objects</div></div><span class="sw-op" onclick="loadW('${k}')">Open</span><span class="sw-dl" onclick="delW('${k}')">🗑</span>`;
  el.appendChild(d);});
}
function delW(k){const d=getSW();delete d[k];setSW(d);loadList();}
function loadW(k){
  const w=getSW()[k];if(!w)return;
  gKey=k;gName=w.name;gDim=w.dim||'3d';gScene=w.scene||[];gChat=w.chat||[];
  openMain();gChat.forEach(m=>addMsg(m.c,m.r));
  if(gDim==='3d')gScene.forEach(o=>applyObj3D(o));
}
function beginWorld(){
  const n=document.getElementById('g-wname').value.trim();
  if(!n){alert('Name your world!');return;}
  gName=n;gKey='w'+Date.now();gScene=[];gChat=[];
  openMain();
  if(gDim==='3d'){
    setTimeout(()=>{
      addMsg('My man, your planet is ready. Tell me what to add — oceans, continents, forests, mountains, cities, rings, moons, anything.','k');
      const fp=document.getElementById('g-fp').value.trim();
      if(fp)setTimeout(()=>gGenerate(fp),600);
    },400);
  } else {
    const fp=document.getElementById('g-fp').value.trim();
    if(fp)setTimeout(()=>gGenerate(fp),400);
    else addMsg('My man, your canvas is blank. Tell me what to create.','k');
  }
}

// ═══════════════════════════════════════════════════════
// THREE.JS ENGINE
// ═══════════════════════════════════════════════════════
let renderer,scene,camera,controls3D,planetMesh,cloudsMesh,atmosphereMesh;
let autoSpin=false,spinBtn;
let mouse3D={isDown:false,lastX:0,lastY:0,button:0};
let touch3D={last:[],pinchDist:0};
let camTheta=0,camPhi=Math.PI/3,camRadius=320;

function init3D(){
  const wrap=document.getElementById('g-3d-wrap');
  const W=wrap.clientWidth,H=wrap.clientHeight;

  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('g-3d-canvas'),antialias:true,alpha:false});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(W,H);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.1;

  scene=new THREE.Scene();

  // Camera
  camera=new THREE.PerspectiveCamera(45,W/H,1,10000);
  updateCamPos();

  // Star field
  const starGeo=new THREE.BufferGeometry();
  const starVerts=[];
  for(let i=0;i<8000;i++){
    const r=2000;
    starVerts.push((Math.random()-.5)*r*2,(Math.random()-.5)*r*2,(Math.random()-.5)*r*2);
  }
  starGeo.setAttribute('position',new THREE.Float32BufferAttribute(starVerts,3));
  const starMat=new THREE.PointsMaterial({color:0xffffff,size:1.2,sizeAttenuation:true});
  scene.add(new THREE.Points(starGeo,starMat));

  // Sun light (directional)
  const sun=new THREE.DirectionalLight(0xfff5e0,2.2);
  sun.position.set(800,400,600);
  sun.castShadow=true;
  sun.shadow.mapSize.width=2048;sun.shadow.mapSize.height=2048;
  sun.shadow.camera.near=100;sun.shadow.camera.far=2000;
  scene.add(sun);
  // Ambient
  scene.add(new THREE.AmbientLight(0x112233,0.4));
  // Rim light (opposite sun, blue tint)
  const rim=new THREE.DirectionalLight(0x2244aa,0.5);
  rim.position.set(-600,-200,-400);scene.add(rim);

  // PLANET
  buildPlanet();

  // Resize handler
  window.addEventListener('resize',()=>{
    const W2=wrap.clientWidth,H2=wrap.clientHeight;
    renderer.setSize(W2,H2);camera.aspect=W2/H2;camera.updateProjectionMatrix();
  });

  // Controls
  bindControls3D();
  animate3D();
}

function buildPlanet(){
  const R=100;
  // Geometry (high-res sphere)
  const geo=new THREE.SphereGeometry(R,64,64);

  // Create procedural planet texture on a canvas
  const texSize=1024;
  const tc=document.createElement('canvas');tc.width=tc.height=texSize;
  const tctx=tc.getContext('2d');

  // Ocean base
  const oceanG=tctx.createLinearGradient(0,0,0,texSize);
  oceanG.addColorStop(0,'#1a3a8a');oceanG.addColorStop(0.5,'#1e5ab8');oceanG.addColorStop(1,'#0a2060');
  tctx.fillStyle=oceanG;tctx.fillRect(0,0,texSize,texSize);

  // Add some continent-like patches procedurally
  const landColors=['#3a7a30','#4a8a40','#2a6a20','#5a6a30','#6a5a20'];
  for(let i=0;i<12;i++){
    const cx=Math.random()*texSize,cy=Math.random()*texSize;
    const rx=50+Math.random()*200,ry=30+Math.random()*120;
    tctx.beginPath();tctx.ellipse(cx,cy,rx,ry,Math.random()*Math.PI,0,Math.PI*2);
    tctx.fillStyle=landColors[Math.floor(Math.random()*landColors.length)];
    tctx.fill();
    // Mountain tint on some
    if(Math.random()>.6){
      tctx.beginPath();tctx.ellipse(cx+rx*.1,cy-ry*.2,rx*.3,ry*.3,Math.random(),0,Math.PI*2);
      tctx.fillStyle='rgba(180,160,140,0.5)';tctx.fill();
    }
  }
  // Ice caps
  for(let yy=0;yy<80;yy++){tctx.fillStyle=`rgba(240,248,255,${1-yy/80})`;tctx.fillRect(0,yy,texSize,1);}
  for(let yy=0;yy<80;yy++){tctx.fillStyle=`rgba(240,248,255,${1-(80-yy)/80})`;tctx.fillRect(0,texSize-80+yy,texSize,1);}

  const planetTex=new THREE.CanvasTexture(tc);

  // Normal map canvas (bump-like)
  const nc=document.createElement('canvas');nc.width=nc.height=512;
  const nctx=nc.getContext('2d');nctx.fillStyle='#8080ff';nctx.fillRect(0,0,512,512);
  const normalTex=new THREE.CanvasTexture(nc);

  // Specular map — ocean shiny, land matte
  const sc=document.createElement('canvas');sc.width=sc.height=texSize;
  const sctx=sc.getContext('2d');
  sctx.drawImage(tc,0,0);
  // We'll use roughness from the texture
  const specTex=new THREE.CanvasTexture(sc);

  const mat=new THREE.MeshStandardMaterial({
    map:planetTex,
    normalMap:normalTex,
    roughness:0.75,
    metalness:0.0,
  });
  planetMesh=new THREE.Mesh(geo,mat);
  planetMesh.castShadow=true;planetMesh.receiveShadow=true;
  planetMesh.name='planet';
  scene.add(planetMesh);

  // Atmosphere (outer glow shell)
  const atmGeo=new THREE.SphereGeometry(R*1.025,32,32);
  const atmMat=new THREE.MeshPhongMaterial({
    color:0x4488ff,transparent:true,opacity:0.12,
    side:THREE.FrontSide,depthWrite:false,blending:THREE.AdditiveBlending
  });
  atmosphereMesh=new THREE.Mesh(atmGeo,atmMat);
  scene.add(atmosphereMesh);

  // Cloud layer
  const cloudGeo=new THREE.SphereGeometry(R*1.012,48,48);
  const cc=document.createElement('canvas');cc.width=cc.height=512;
  const cctx=cc.getContext('2d');
  cctx.fillStyle='transparent';cctx.clearRect(0,0,512,512);
  for(let i=0;i<40;i++){
    const x=Math.random()*512,y=Math.random()*512;
    const grd=cctx.createRadialGradient(x,y,0,x,y,20+Math.random()*40);
    grd.addColorStop(0,'rgba(255,255,255,0.55)');grd.addColorStop(1,'rgba(255,255,255,0)');
    cctx.fillStyle=grd;cctx.beginPath();cctx.ellipse(x,y,25+Math.random()*50,10+Math.random()*20,Math.random()*Math.PI,0,Math.PI*2);cctx.fill();
  }
  const cloudTex=new THREE.CanvasTexture(cc);
  const cloudMat=new THREE.MeshStandardMaterial({
    map:cloudTex,alphaMap:cloudTex,transparent:true,
    opacity:0.85,depthWrite:false,roughness:1,metalness:0
  });
  cloudsMesh=new THREE.Mesh(cloudGeo,cloudMat);
  cloudsMesh.name='clouds';
  scene.add(cloudsMesh);
}

function animate3D(){
  requestAnimationFrame(animate3D);
  if(autoSpin&&planetMesh){planetMesh.rotation.y+=0.003;if(cloudsMesh)cloudsMesh.rotation.y+=0.0035;if(atmosphereMesh)atmosphereMesh.rotation.y+=0.001;}
  renderer.render(scene,camera);
}

function updateCamPos(){
  const x=camRadius*Math.sin(camPhi)*Math.sin(camTheta);
  const y=camRadius*Math.cos(camPhi);
  const z=camRadius*Math.sin(camPhi)*Math.cos(camTheta);
  camera.position.set(x,y,z);camera.lookAt(0,0,0);
}

function resetCam(){camTheta=0;camPhi=Math.PI/3;camRadius=320;updateCamPos();}
function toggleSpin(){autoSpin=!autoSpin;document.getElementById('g-spin-btn').style.color=autoSpin?'#00ff88':'#00cc66';}
function clearScene3D(){
  // Remove everything except planet, atmosphere, clouds, stars, lights
  const keep=['planet','clouds'];
  scene.children=scene.children.filter(o=>!o.name||keep.includes(o.name)||o instanceof THREE.Light||o instanceof THREE.Points||o.name==='atm');
  atmosphereMesh&&scene.add(atmosphereMesh);
  gScene=[];addMsg('World cleared. Tell me what to add.','k');
}

// ── 3D CONTROLS ──────────────────────────────────────
function bindControls3D(){
  const el=document.getElementById('g-3d-wrap');
  // Mouse
  el.addEventListener('mousedown',e=>{mouse3D.isDown=true;mouse3D.lastX=e.clientX;mouse3D.lastY=e.clientY;mouse3D.button=e.button;});
  el.addEventListener('mousemove',e=>{
    if(!mouse3D.isDown)return;
    const dx=e.clientX-mouse3D.lastX,dy=e.clientY-mouse3D.lastY;
    if(mouse3D.button===0){camTheta-=dx*0.008;camPhi=Math.max(0.1,Math.min(Math.PI-.1,camPhi+dy*0.008));}
    else if(mouse3D.button===2){camRadius=Math.max(130,Math.min(2000,camRadius+dy*0.8));}
    mouse3D.lastX=e.clientX;mouse3D.lastY=e.clientY;updateCamPos();
  });
  window.addEventListener('mouseup',()=>mouse3D.isDown=false);
  el.addEventListener('wheel',e=>{e.preventDefault();camRadius=Math.max(130,Math.min(2000,camRadius+e.deltaY*0.5));updateCamPos();},{passive:false});
  el.addEventListener('contextmenu',e=>e.preventDefault());
  // Touch
  el.addEventListener('touchstart',e=>{e.preventDefault();const ts=[...e.touches];if(ts.length===1){touch3D.last=[{x:ts[0].clientX,y:ts[0].clientY}];touch3D.pinchDist=0;}else if(ts.length===2){touch3D.pinchDist=Math.hypot(ts[1].clientX-ts[0].clientX,ts[1].clientY-ts[0].clientY);touch3D.last=[{x:ts[0].clientX,y:ts[0].clientY},{x:ts[1].clientX,y:ts[1].clientY}];}},{passive:false});
  el.addEventListener('touchmove',e=>{
    e.preventDefault();const ts=[...e.touches];
    if(ts.length===1&&touch3D.last.length===1){
      const dx=ts[0].clientX-touch3D.last[0].x,dy=ts[0].clientY-touch3D.last[0].y;
      camTheta-=dx*0.009;camPhi=Math.max(0.1,Math.min(Math.PI-.1,camPhi+dy*0.009));
      touch3D.last=[{x:ts[0].clientX,y:ts[0].clientY}];updateCamPos();
    } else if(ts.length===2){
      const nd=Math.hypot(ts[1].clientX-ts[0].clientX,ts[1].clientY-ts[0].clientY);
      if(touch3D.pinchDist>0){camRadius=Math.max(130,Math.min(2000,camRadius*(touch3D.pinchDist/nd)));}
      touch3D.pinchDist=nd;touch3D.last=[{x:ts[0].clientX,y:ts[0].clientY},{x:ts[1].clientX,y:ts[1].clientY}];updateCamPos();
    }
  },{passive:false});
  el.addEventListener('touchend',e=>{touch3D.last=[];touch3D.pinchDist=0;},{passive:false});
}

// APPLY 3D OBJECTS FROM AI
// ═══════════════════════════════════════════════════════
function applyObj3D(obj){
  const R=100; // planet radius
  const lat=(obj.lat||0)*Math.PI/180;
  const lon=(obj.lon||0)*Math.PI/180;
  const alt=obj.alt||0;
  const r=R+alt;

  // Convert lat/lon to 3D position on sphere surface
  function latLon(la,lo,ra){
    const lt=la*Math.PI/180,ln=lo*Math.PI/180;
    return new THREE.Vector3(ra*Math.cos(lt)*Math.sin(ln),-ra*Math.sin(lt),ra*Math.cos(lt)*Math.cos(ln));
  }
  const pos=latLon(obj.lat||0,obj.lon||0,r);
  const up=pos.clone().normalize();

  // Quaternion that aligns Y-up to surface normal
  function surfaceQuat(pos){const up2=new THREE.Vector3(0,1,0);const n=pos.clone().normalize();const q=new THREE.Quaternion().setFromUnitVectors(up2,n);return q;}
  const sq=surfaceQuat(pos);

  let mesh;

  switch(obj.type){

    case 'ocean3d':{
      // Repaint planet texture to add ocean region
      // Simplified: add a blue tinted overlay sphere
      const geo=new THREE.SphereGeometry(R*1.001,32,32);
      // Create ocean texture patch
      const mat=new THREE.MeshStandardMaterial({
        color:new THREE.Color(obj.color||'#1a4a9a'),
        transparent:true,opacity:0.55,
        roughness:0.3,metalness:0.1,
        depthWrite:false,blending:THREE.NormalBlending,
        side:THREE.FrontSide
      });
      mesh=new THREE.Mesh(geo,mat);mesh.name='ocean3d';
      scene.add(mesh);return;
    }

    case 'continent3d':{
      // Continent as a low-relief bumped region
      const geo=new THREE.SphereGeometry(R*1.002,48,48);
      const mat=new THREE.MeshStandardMaterial({
        color:new THREE.Color(obj.color||'#4a7a30'),
        roughness:0.85,metalness:0,
        transparent:true,opacity:0.9
      });
      // Custom UV-based masking would be ideal; approximate with a semi-transparent sphere
      mesh=new THREE.Mesh(geo,mat);mesh.name='continent3d';
      scene.add(mesh);return;
    }

    case 'forest3d':{
      const count=obj.count||12;const spread=(obj.spread||8)*Math.PI/180;
      const grp=new THREE.Group();grp.name='forest3d';
      for(let i=0;i<count;i++){
        const la=(obj.lat||0)+(Math.sin(i*2.4)*spread*180/Math.PI);
        const lo=(obj.lon||0)+(Math.cos(i*1.7)*spread*180/Math.PI);
        const p=latLon(la,lo,R+0.5);
        const h=obj.treeH||6+Math.random()*3;const w=obj.treeW||2.5+Math.random()*1.5;
        // Trunk
        const trunkGeo=new THREE.CylinderGeometry(w*.15,w*.2,h*.35,6);
        const trunkMat=new THREE.MeshStandardMaterial({color:new THREE.Color(obj.trunkColor||'#5a3010'),roughness:0.9});
        const trunk=new THREE.Mesh(trunkGeo,trunkMat);
        trunk.position.copy(p);trunk.quaternion.copy(sq);
        trunk.translateY(h*.175);
        // Canopy layers
        const canColor=new THREE.Color(obj.fill||(i%2?'#2a7a18':'#1a6a10'));
        for(let l=0;l<(obj.pine?3:2);l++){
          const coneGeo=obj.pine?new THREE.ConeGeometry(w*(1-l*.2),h*.45,8):new THREE.SphereGeometry(w*(1-l*.15),8,6);
          const coneMat=new THREE.MeshStandardMaterial({color:canColor,roughness:0.85});
          const cone=new THREE.Mesh(coneGeo,coneMat);
          cone.position.copy(p);cone.quaternion.copy(sq);
          cone.translateY(h*(.5+l*.15));
          cone.castShadow=true;
          grp.add(cone);
        }
        trunk.castShadow=true;trunk.receiveShadow=true;
        grp.add(trunk);
      }
      scene.add(grp);mesh=grp;break;
    }

    case 'mountain3d':{
      const h=obj.height||18,w=obj.width||14;
      const geo=new THREE.ConeGeometry(w,h,8,3);
      // Add some vertex noise for natural look
      const pos2=geo.attributes.position;
      for(let i=0;i<pos2.count;i++){
        const y=pos2.getY(i);if(y<h*.9&&y>-h*.1){
          pos2.setX(i,pos2.getX(i)*(1+Math.sin(i*3.7)*.15));
          pos2.setZ(i,pos2.getZ(i)*(1+Math.cos(i*2.3)*.12));
        }
      }
      geo.computeVertexNormals();
      const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(obj.fill||'#666677'),roughness:0.9,metalness:0.0});
      mesh=new THREE.Mesh(geo,mat);
      mesh.position.copy(pos);mesh.quaternion.copy(sq);
      mesh.translateY(h*.5);mesh.castShadow=true;mesh.receiveShadow=true;
      // Snow cap sphere
      const capGeo=new THREE.SphereGeometry(w*.35,8,8);
      const capMat=new THREE.MeshStandardMaterial({color:0xf0f4ff,roughness:0.7});
      const cap=new THREE.Mesh(capGeo,capMat);
      cap.position.copy(pos);cap.quaternion.copy(sq);cap.translateY(h*.7);
      scene.add(mesh);scene.add(cap);break;
    }

    case 'tree3d':{
      const h=obj.height||10,w=obj.width||4;
      const grp=new THREE.Group();
      const trunkGeo=new THREE.CylinderGeometry(w*.12,w*.18,h*.3,6);
      const trunkMat=new THREE.MeshStandardMaterial({color:new THREE.Color(obj.trunkColor||'#5a3010'),roughness:0.9});
      const trunk=new THREE.Mesh(trunkGeo,trunkMat);trunk.position.y=h*.15;trunk.castShadow=true;grp.add(trunk);
      if(obj.pine){
        for(let l=0;l<3;l++){const cg=new THREE.ConeGeometry(w*(1-l*.25),h*.4,8);const cm=new THREE.MeshStandardMaterial({color:new THREE.Color(obj.fill||'#1a7a10'),roughness:0.85});const c2=new THREE.Mesh(cg,cm);c2.position.y=h*(.45+l*.18);c2.castShadow=true;grp.add(c2);}
      } else {const sg=new THREE.SphereGeometry(w*.7,8,6);const sm=new THREE.MeshStandardMaterial({color:new THREE.Color(obj.fill||'#2a8a18'),roughness:0.85});const sp=new THREE.Mesh(sg,sm);sp.position.y=h*.6;sp.castShadow=true;grp.add(sp);}
      grp.position.copy(pos);grp.quaternion.copy(sq);
      scene.add(grp);mesh=grp;break;
    }

    case 'city3d':{
      const count=obj.buildings||16;const spread=(obj.spread||5)*Math.PI/180;
      const grp=new THREE.Group();grp.name='city3d';
      for(let i=0;i<count;i++){
        const la=(obj.lat||0)+(Math.sin(i*2.1)*spread*180/Math.PI);
        const lo=(obj.lon||0)+(Math.cos(i*1.9)*spread*180/Math.PI);
        const p2=latLon(la,lo,R+.5);const sq2=surfaceQuat(p2);
        const h=3+Math.abs(Math.sin(i*2.3))*18,w=1.5+Math.random()*2.5;
        const geo=new THREE.BoxGeometry(w,h,w);
        const hue=210+i*5;const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(`hsl(${hue},30%,${20+i%5*6}%)`),roughness:0.6,metalness:0.3,emissive:new THREE.Color(`hsl(${hue},40%,5%)`),emissiveIntensity:0.3});
        const b=new THREE.Mesh(geo,mat);b.position.copy(p2);b.quaternion.copy(sq2);b.translateY(h*.5);b.castShadow=true;grp.add(b);
      }
      scene.add(grp);mesh=grp;break;
    }

    case 'cloud3d':{
      const grp=new THREE.Group();grp.name='cloud3d';
      const puffs=obj.puffs||[[0,0,0],[obj.w||4,0,-1],[-(obj.w||4),0,-1],[0,-(obj.h||2),0]];
      puffs.forEach(([px,py,pz])=>{
        const r2=(obj.size||3)+Math.random()*2;
        const geo=new THREE.SphereGeometry(r2,8,6);
        const mat=new THREE.MeshStandardMaterial({color:0xf0f4ff,roughness:1,transparent:true,opacity:0.82,depthWrite:false});
        const c2=new THREE.Mesh(geo,mat);c2.position.set(px,py,pz);grp.add(c2);
      });
      grp.position.copy(pos);grp.quaternion.copy(sq);
      scene.add(grp);mesh=grp;break;
    }

    case 'volcano3d':{
      const h=obj.height||20,w=obj.width||15;
      const geo=new THREE.ConeGeometry(w,h,10,2,true);// open top
      const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(obj.fill||'#5a3010'),roughness:0.9,side:THREE.FrontSide});
      mesh=new THREE.Mesh(geo,mat);mesh.position.copy(pos);mesh.quaternion.copy(sq);mesh.translateY(h*.5);mesh.castShadow=true;
      // Lava top glow
      const lavaGeo=new THREE.CircleGeometry(w*.25,12);
      const lavaMat=new THREE.MeshStandardMaterial({color:0xff4400,emissive:new THREE.Color(0xff2200),emissiveIntensity:2,roughness:0.3});
      const lava=new THREE.Mesh(lavaGeo,lavaMat);lava.position.copy(pos);lava.quaternion.copy(sq);lava.translateY(h*1.01);
      scene.add(mesh);scene.add(lava);break;
    }

    case 'ring3d':{
      const inner=R*(obj.innerR||1.3),outer=R*(obj.outerR||1.8);
      const geo=new THREE.RingGeometry(inner,outer,64);
      const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(obj.fill||'#c8a050'),roughness:0.8,transparent:true,opacity:0.6,side:THREE.DoubleSide,depthWrite:false});
      mesh=new THREE.Mesh(geo,mat);
      mesh.rotation.x=Math.PI/2+.15;mesh.name='ring3d';
      scene.add(mesh);return;
    }

    case 'moon3d':{
      const mr=obj.r||20;
      const geo=new THREE.SphereGeometry(mr,24,24);
      const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(obj.fill||'#c8c0a0'),roughness:0.9,metalness:0});
      mesh=new THREE.Mesh(geo,mat);
      const dist=R*(obj.dist||2.5);
      const angle=obj.angle||0;
      mesh.position.set(Math.sin(angle)*dist,obj.elevation||0,Math.cos(angle)*dist);
      mesh.name='moon3d';scene.add(mesh);
      // Animate orbit
      (function orbitMoon(){requestAnimationFrame(orbitMoon);const t=Date.now()/3000*(obj.speed||1);mesh.position.x=Math.sin(t+angle)*dist;mesh.position.z=Math.cos(t+angle)*dist;})();
      return;
    }

    case 'sphere3d':{
      const r2=obj.r||8;
      const geo=new THREE.SphereGeometry(r2,16,16);
      const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(obj.fill||'#4488cc'),roughness:obj.roughness||0.7,metalness:obj.metalness||0,emissive:obj.emissive?new THREE.Color(obj.emissive):undefined,emissiveIntensity:obj.emissiveIntensity||0});
      mesh=new THREE.Mesh(geo,mat);mesh.position.copy(pos);mesh.castShadow=true;
      scene.add(mesh);return;
    }

    case 'box3d':{
      const geo=new THREE.BoxGeometry(obj.w||8,obj.h||8,obj.d||8);
      const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(obj.fill||'#888888'),roughness:0.7,metalness:0.1});
      mesh=new THREE.Mesh(geo,mat);mesh.position.copy(pos);mesh.quaternion.copy(sq);mesh.translateY((obj.h||8)*.5);mesh.castShadow=true;
      scene.add(mesh);break;
    }

    case 'light3d':{
      const pl=new THREE.PointLight(new THREE.Color(obj.color||'#ffaa44'),obj.intensity||2,obj.distance||300);
      pl.position.copy(pos);pl.position.add(up.multiplyScalar(obj.alt||20));scene.add(pl);return;
    }

    case 'ice3d':{
      // Ice cap — bluish white overlay on polar area
      const geo=new THREE.SphereGeometry(R*1.003,32,32);
      const mat=new THREE.MeshStandardMaterial({color:0xddeeff,roughness:0.4,metalness:0.1,transparent:true,opacity:0.7,depthWrite:false});
      mesh=new THREE.Mesh(geo,mat);mesh.name='ice3d';scene.add(mesh);return;
    }

    case 'water3d':{
      // Animated water plane at surface
      const geo=new THREE.SphereGeometry(R*1.004,48,48);
      const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(obj.fill||'#1a5aaa'),roughness:0.1,metalness:0.3,transparent:true,opacity:0.65,depthWrite:false,blending:THREE.NormalBlending});
      mesh=new THREE.Mesh(geo,mat);mesh.name='water3d';scene.add(mesh);return;
    }

    default:{
      // Generic sphere at lat/lon for unrecognized types
      const geo=new THREE.SphereGeometry(obj.r||5,10,10);
      const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(obj.fill||'#00ff88'),roughness:0.7});
      mesh=new THREE.Mesh(geo,mat);mesh.position.copy(pos);scene.add(mesh);
    }
  }
  if(mesh)mesh.name=obj.type||'obj';
}

// 2D ENGINE (unchanged from before, simplified)
// ═══════════════════════════════════════════════════════
let c2d,ctx2d,W2d,H2d,DPR2d=window.devicePixelRatio||1;
let vp2d={x:0,y:0,scale:1,rot:0},pan2d=null,pinch2d=null;

function init2D(){
  const wrap=document.getElementById('g-2d-wrap');
  c2d=document.getElementById('g-2d-canvas');ctx2d=c2d.getContext('2d');
  W2d=wrap.clientWidth;H2d=wrap.clientHeight;DPR2d=window.devicePixelRatio||1;
  c2d.width=W2d*DPR2d;c2d.height=H2d*DPR2d;c2d.style.width=W2d+'px';c2d.style.height=H2d+'px';
  vp2d={x:W2d/2,y:H2d/2,scale:1,rot:0};
  window.addEventListener('resize',()=>{W2d=wrap.clientWidth;H2d=wrap.clientHeight;c2d.width=W2d*DPR2d;c2d.height=H2d*DPR2d;c2d.style.width=W2d+'px';c2d.style.height=H2d+'px';draw2D();});
  bind2D();draw2D();
}
function resetVP(){vp2d={x:W2d/2,y:H2d/2,scale:1,rot:0};draw2D();}
function clearScene2D(){gScene=[];draw2D();addMsg('Canvas cleared.','k');}
function bind2D(){
  const el=document.getElementById('g-2d-wrap');
  el.addEventListener('mousedown',e=>{pan2d={x:e.clientX,y:e.clientY,vx:vp2d.x,vy:vp2d.y};});
  el.addEventListener('mousemove',e=>{if(!pan2d)return;vp2d.x=pan2d.vx+(e.clientX-pan2d.x);vp2d.y=pan2d.vy+(e.clientY-pan2d.y);draw2D();});
  window.addEventListener('mouseup',()=>pan2d=null);
  el.addEventListener('wheel',e=>{e.preventDefault();const f=e.deltaY<0?1.12:0.89;const r=c2d.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;const nx=(mx-vp2d.x)*f,ny=(my-vp2d.y)*f;vp2d.scale=Math.max(.05,Math.min(30,vp2d.scale*f));vp2d.x=mx-nx;vp2d.y=my-ny;draw2D();},{passive:false});
  el.addEventListener('touchstart',e=>{e.preventDefault();const ts=[...e.touches];if(ts.length===1){pan2d={x:ts[0].clientX,y:ts[0].clientY,vx:vp2d.x,vy:vp2d.y};pinch2d=null;}else if(ts.length===2){pan2d=null;const r=c2d.getBoundingClientRect(),mid={(x:(ts[0].clientX+ts[1].clientX)/2-r.left,y:(ts[0].clientY+ts[1].clientY)/2-r.top)};pinch2d={dist:Math.hypot(ts[1].clientX-ts[0].clientX,ts[1].clientY-ts[0].clientY),sc:vp2d.scale,mx:mid.x,my:mid.y,vx:vp2d.x,vy:vp2d.y};}},{passive:false});
  el.addEventListener('touchmove',e=>{e.preventDefault();const ts=[...e.touches];if(ts.length===1&&pan2d){vp2d.x=pan2d.vx+(ts[0].clientX-pan2d.x);vp2d.y=pan2d.vy+(ts[0].clientY-pan2d.y);draw2D();}else if(ts.length===2&&pinch2d){const nd=Math.hypot(ts[1].clientX-ts[0].clientX,ts[1].clientY-ts[0].clientY);const f=nd/pinch2d.dist;vp2d.scale=Math.max(.05,Math.min(30,pinch2d.sc*f));vp2d.x=pinch2d.mx-(pinch2d.mx-pinch2d.vx)*f;vp2d.y=pinch2d.my-(pinch2d.my-pinch2d.vy)*f;draw2D();}},{passive:false});
  el.addEventListener('touchend',()=>{pan2d=null;pinch2d=null;},{passive:false});
}
function draw2D(){
  if(!ctx2d)return;
  const c=ctx2d,p=DPR2d;c.setTransform(p,0,0,p,0,0);c.clearRect(0,0,W2d,H2d);
  const bg=c.createLinearGradient(0,0,0,H2d);bg.addColorStop(0,'#000805');bg.addColorStop(1,'#000300');
  c.fillStyle=bg;c.fillRect(0,0,W2d,H2d);
  c.strokeStyle='rgba(0,255,136,0.04)';c.lineWidth=1;
  for(let x=0;x<W2d;x+=50){c.beginPath();c.moveTo(x,0);c.lineTo(x,H2d);c.stroke();}
  for(let y=0;y<H2d;y+=50){c.beginPath();c.moveTo(0,y);c.lineTo(W2d,y);c.stroke();}
  c.strokeStyle='rgba(0,255,136,0.12)';c.lineWidth=2;c.strokeRect(1,1,W2d-2,H2d-2);
  c.save();c.translate(vp2d.x,vp2d.y);c.rotate(vp2d.rot);c.scale(vp2d.scale,vp2d.scale);
  gScene.forEach(o=>{c.save();draw2DObj(c,o,W2d,H2d);c.restore();});
  c.restore();
}
function rr2(c,x,y,w,h,r){r=Math.min(r,w/2,h/2);c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function draw2DObj(c,obj,W,H){
  const ox=(obj.x||.5)*W,oy=(obj.y||.5)*H,ow=(obj.w||.1)*W,oh=(obj.h||.1)*H,or_=(obj.r||.05)*Math.min(W,H);
  c.translate(ox,oy);if(obj.angle)c.rotate(obj.angle);
  const fill=obj.fill||'none',stroke=obj.stroke||obj.color||'#00ff88',lw=obj.lineWidth||2;
  c.fillStyle=fill==='none'?'transparent':fill;c.strokeStyle=stroke;c.lineWidth=lw;c.lineCap='round';c.lineJoin='round';
  c.shadowColor=obj.glow||stroke;c.shadowBlur=obj.glowSize||8;
  switch(obj.type){
    case 'circle':c.beginPath();c.arc(0,0,or_,0,Math.PI*2);if(fill!=='none')c.fill();c.stroke();break;
    case 'rect':rr2(c,-ow/2,-oh/2,ow,oh,obj.radius||0);if(fill!=='none')c.fill();c.stroke();break;
    case 'text':{const fs=(obj.fontSize||.04)*H;c.font=`bold ${fs}px "Courier New"`;c.fillStyle=stroke;c.textAlign='center';c.textBaseline='middle';c.fillText(obj.text||'',0,0);break;}
    case 'sun':{const sr=or_;const sg=c.createRadialGradient(0,0,sr*.5,0,0,sr*2.2);sg.addColorStop(0,'rgba(255,240,80,0.5)');sg.addColorStop(1,'rgba(255,160,0,0)');c.beginPath();c.arc(0,0,sr*2.2,0,Math.PI*2);c.fillStyle=sg;c.fill();const sg2=c.createRadialGradient(-sr*.3,-sr*.3,0,0,0,sr);sg2.addColorStop(0,'#ffffc0');sg2.addColorStop(1,'#ff8800');c.beginPath();c.arc(0,0,sr,0,Math.PI*2);c.fillStyle=sg2;c.shadowColor='#ffaa00';c.shadowBlur=30;c.fill();break;}
    case 'cloud':{const pf=[[-.28*ow,-.05*oh,.25*ow],[0,-.18*oh,.32*ow],[.25*ow,-.05*oh,.22*ow],[0,.08*oh,.18*ow]];c.fillStyle=fill||'rgba(240,245,255,0.95)';pf.forEach(([px,py,pr])=>{c.beginPath();c.arc(px,py,pr,0,Math.PI*2);c.fill();});break;}
    case 'mountain':{const mg=c.createLinearGradient(0,-oh/2,0,oh/2);mg.addColorStop(0,obj.peakColor||'#fff');mg.addColorStop(.3,fill||'#666677');mg.addColorStop(1,obj.baseColor||'#334433');c.beginPath();c.moveTo(-ow/2,oh*.5);c.lineTo(0,-oh*.5);c.lineTo(ow/2,oh*.5);c.closePath();c.fillStyle=mg;c.fill();c.stroke();break;}
    case 'tree':{c.fillStyle=obj.trunkColor||'#5a3010';c.fillRect(-ow*.06,-oh*.1,ow*.12,oh*.35);c.beginPath();c.moveTo(0,-oh*.5);c.lineTo(-ow*.5,-oh*.1);c.lineTo(ow*.5,-oh*.1);c.closePath();c.fillStyle=fill||'#2a7a18';c.fill();break;}
    case 'house':{c.fillStyle=fill||'#c8a87a';rr2(c,-ow/2,0,ow,oh*.6,3);c.fill();c.stroke();c.beginPath();c.moveTo(-ow*.55,0);c.lineTo(0,-oh*.48);c.lineTo(ow*.55,0);c.closePath();c.fillStyle=obj.roofColor||'#8b2020';c.fill();c.stroke();break;}
    case 'ocean':case 'lake':case 'water':{const wg=c.createLinearGradient(0,-oh/2,0,oh/2);wg.addColorStop(0,fill||'rgba(30,100,200,.85)');wg.addColorStop(1,'rgba(0,30,100,.95)');c.fillStyle=wg;if(obj.type==='lake'){c.beginPath();c.ellipse(0,0,ow/2,oh/2,0,0,Math.PI*2);c.fill();}else{c.fillRect(-ow/2,-oh/2,ow,oh);}break;}
    case 'grass':c.fillStyle=fill||'#3a8a18';c.fillRect(-ow/2,-oh/2,ow,oh);break;
    case 'road':c.fillStyle=fill||'#555';c.fillRect(-ow/2,-oh/2,ow,oh);c.setLineDash([ow*.08,ow*.06]);c.strokeStyle='#ffee44';c.lineWidth=oh*.06;c.beginPath();if(ow>oh){c.moveTo(-ow/2,0);c.lineTo(ow/2,0);}else{c.moveTo(0,-oh/2);c.lineTo(0,oh/2);}c.stroke();c.setLineDash([]);break;
    case 'building':{c.fillStyle=fill||'#1a2a3a';rr2(c,-ow/2,-oh/2,ow,oh,4);c.fill();c.strokeStyle=stroke;c.lineWidth=lw;c.stroke();const wC=obj.cols||3,wR=obj.rows||5;const ww=ow/(wC*1.8),wh=oh/(wR*1.8);for(let r=0;r<wR;r++)for(let cl=0;cl<wC;cl++){const wx=-ow/2+ow*(cl+.5)/wC-ww/2,wy=-oh/2+oh*(r+.5)/wR-wh/2;c.fillStyle=Math.random()>.3?'rgba(255,220,80,0.8)':'rgba(20,40,60,0.8)';rr2(c,wx,wy,ww,wh,1);c.fill();}break;}
    case 'forest':{for(let i=0;i<(obj.count||6);i++){const tx=-ow*.4+(i/((obj.count||6)-1))*ow*.8;c.fillStyle=obj.trunkColor||'#5a3010';c.fillRect(tx-ow*.02,0,ow*.04,oh*.3);c.beginPath();c.moveTo(tx,-oh*.5);c.lineTo(tx-ow*.12,0);c.lineTo(tx+ow*.12,0);c.closePath();c.fillStyle=fill||'#2a8a18';c.fill();}break;}
    case 'river':{c.beginPath();c.moveTo(-ow/2,-oh*.4);c.bezierCurveTo(-ow*.1,-oh*.1,ow*.2,oh*.2,ow*.1,oh*.45);c.strokeStyle=fill||'rgba(40,120,220,.85)';c.lineWidth=ow*.12;c.lineCap='round';c.stroke();break;}
    case 'island':{c.beginPath();c.ellipse(0,oh*.1,ow/2,oh*.35,0,0,Math.PI*2);c.fillStyle=fill||'#e8c878';c.fill();c.beginPath();c.ellipse(0,-oh*.08,ow*.35,oh*.28,0,0,Math.PI*2);c.fillStyle='#3a8a18';c.fill();break;}
    case 'fire':{const ft=Date.now()/200;for(let fl=0;fl<6;fl++){const fh=or_*(.5+Math.sin(ft+fl*.8)*.3),fx=Math.sin(ft*.7+fl)*or_*.25;const fg=c.createRadialGradient(fx,-fh*.3,0,fx,-fh*.5,fh);fg.addColorStop(0,'rgba(255,255,200,0.9)');fg.addColorStop(.3,'rgba(255,120,0,0.7)');fg.addColorStop(1,'rgba(255,0,0,0)');c.beginPath();c.ellipse(fx,-fh*.4,or_*.2,fh*.5,0,0,Math.PI*2);c.fillStyle=fg;c.fill();}requestAnimationFrame(draw2D);break;}
    case 'atom':{c.beginPath();c.arc(0,0,or_*.22,0,Math.PI*2);c.fillStyle=fill||'#ffaa00';c.shadowColor='#ff8800';c.shadowBlur=15;c.fill();for(let i=0;i<(obj.orbits||3);i++){c.save();c.rotate(i*Math.PI/(obj.orbits||3));c.beginPath();c.ellipse(0,0,or_,or_*.35,0,0,Math.PI*2);c.strokeStyle=stroke||'#00ff88';c.lineWidth=1.5;c.stroke();const ea=(Date.now()/600+i*2.1)%(Math.PI*2);c.beginPath();c.arc(Math.cos(ea)*or_,Math.sin(ea)*or_*.35,or_*.07,0,Math.PI*2);c.fillStyle='#00ffff';c.shadowColor='#00ffff';c.shadowBlur=12;c.fill();c.restore();}requestAnimationFrame(draw2D);break;}
    case 'rainbow':{const colors=['#ff0000','#ff8800','#ffee00','#00cc00','#0066ff','#8800ff'];colors.forEach((col,i)=>{c.beginPath();c.arc(0,oh*.2,(0.9-i*.12)*ow/2,Math.PI,0);c.strokeStyle=col;c.lineWidth=oh*(0.06+i*.015);c.globalAlpha=0.7;c.stroke();c.globalAlpha=1;});break;}
    case 'volcano':{c.beginPath();c.moveTo(-ow/2,oh*.5);c.lineTo(-ow*.15,-oh*.3);c.lineTo(0,-oh*.5);c.lineTo(ow*.15,-oh*.3);c.lineTo(ow/2,oh*.5);c.closePath();const vg=c.createLinearGradient(0,-oh*.5,0,oh*.5);vg.addColorStop(0,'#3a1a0a');vg.addColorStop(.5,fill||'#6a3a1a');vg.addColorStop(1,'#8a5530');c.fillStyle=vg;c.fill();break;}
    case 'compound':(obj.children||[]).forEach(ch=>{c.save();draw2DObj(c,ch,W,H);c.restore();});break;
    default:{c.beginPath();c.arc(0,0,or_*.5,0,Math.PI*2);c.fillStyle=fill==='none'?'rgba(0,255,136,0.2)':fill;c.fill();c.strokeStyle=stroke;c.lineWidth=lw;c.stroke();if(obj.label){c.font=`bold ${or_*.5}px "Courier New"`;c.fillStyle=stroke;c.textAlign='center';c.textBaseline='middle';c.fillText((obj.label||'').slice(0,4),0,0);}}
  }
}

// ═══════════════════════════════════════════════════════
// MAIN OPEN
// ═══════════════════════════════════════════════════════
function openMain(){
  document.getElementById('g-setup').classList.remove('on');
  document.getElementById('g-main').classList.add('on');
  document.getElementById('g-hname').textContent=gName;
  document.getElementById('g-dbadge').textContent=gDim.toUpperCase();
  drawKFace();
  document.getElementById('g-inp').addEventListener('keydown',e=>{if(e.key==='Enter')gSend();});
  setTimeout(()=>document.getElementById('g-hint').style.opacity='0',4000);
  if(gDim==='3d'){
    document.getElementById('g-3d-wrap').style.display='flex';document.getElementById('g-2d-wrap').style.display='none';
    init3D();
  } else {
    document.getElementById('g-3d-wrap').style.display='none';document.getElementById('g-2d-wrap').style.display='block';
    document.getElementById('g-2d-wrap').style.flex='1';
    init2D();
  }
}

// ═══════════════════════════════════════════════════════
// KEITH FACE
// ═══════════════════════════════════════════════════════
function drawKFace(){
  const fc=document.getElementById('g-kface'),c=fc.getContext('2d'),cx=32,cy=35,s=0.48;
  c.clearRect(0,0,64,64);c.fillStyle='#050f05';c.beginPath();c.arc(32,32,31,0,Math.PI*2);c.fill();
  c.strokeStyle='#00aa44';c.lineWidth=2;c.beginPath();c.arc(32,32,31,0,Math.PI*2);c.stroke();
  function ov(dx,dy,rx,ry,f2){c.beginPath();c.ellipse(cx+dx*s,cy+dy*s,rx*s,ry*s,0,0,Math.PI*2);c.fillStyle=f2;c.fill();}
  ov(0,-10,44,52,'#3a1f0a');ov(-50,-8,8,10,'#3a1f0a');ov(50,-8,8,10,'#3a1f0a');
  ov(-20,-14,5,5,'#111');ov(20,-14,5,5,'#111');ov(-22,-16,2.5,2.5,'white');ov(18,-16,2.5,2.5,'white');
  [-40,-33,-26].forEach(yl=>{c.beginPath();c.moveTo(cx-15*s,cy+yl*s);c.lineTo(cx+15*s,cy+yl*s);c.strokeStyle='#1e0f00';c.lineWidth=s;c.stroke();});
  c.beginPath();c.moveTo(cx-36*s,cy-22*s);c.lineTo(cx-12*s,cy-26*s);c.strokeStyle='#0a0000';c.lineWidth=3*s;c.lineCap='round';c.stroke();
  c.beginPath();c.moveTo(cx+12*s,cy-26*s);c.lineTo(cx+36*s,cy-22*s);c.strokeStyle='#0a0000';c.lineWidth=3*s;c.stroke();
  ov(0,8,5,7,'#1e0f00');c.beginPath();c.ellipse(cx,cy+18*s,18*s,8*s,0,Math.PI,Math.PI*2);c.fillStyle='#0a0000';c.fill();
  ov(0,32,16,14,'#0a0000');c.beginPath();c.ellipse(cx,cy+26*s,8*s,5*s,0,Math.PI,Math.PI*2);c.fillStyle='#aa7744';c.fill();
}

// ═══════════════════════════════════════════════════════
// AI GENERATION
// ═══════════════════════════════════════════════════════
async function gSend(){const inp=document.getElementById('g-inp'),p=inp.value.trim();if(!p||gSending)return;inp.value='';await gGenerate(p);}
async function gGenerate(prompt){
  if(gSending)return;gSending=true;
  document.getElementById('g-send').disabled=true;
  document.getElementById('g-think').classList.add('on');
  setStat('Keith is creating...');addMsg(prompt,'u');gChat.push({r:'u',c:prompt});
  try{
    const history=gChat.slice(-6).map(m=>({role:m.r==='k'?'assistant':'user',content:m.c}));
    const sys=gDim==='3d'?`You are Keith GPT, God of a 3D planet world called "${gName}" rendered with Three.js. The base is a sphere planet radius ~100 units.

RESPOND ONLY with valid JSON (no markdown):
{"speech":"Keith 1-2 sentence calm old-man response","objects":[...]}

3D OBJECT TYPES (all placed on planet surface using lat/lon degrees):
- ocean3d: lat,lon, color(hex, default #1a4a9a)
- water3d: lat,lon, fill(hex) — smaller water body
- continent3d: lat,lon, color(hex, default #4a7a30)
- forest3d: lat,lon, count(6-20), spread(5-25 degrees), fill(hex), trunkColor(hex), treeH(5-15), treeW(2-5), pine(bool)
- mountain3d: lat,lon, fill(hex), baseColor(hex), peakColor(hex), width(8-25), height(12-30), alt(0-5)
- tree3d: lat,lon, fill(hex), trunkColor(hex), height(8-18), width(3-8), pine(bool), alt(0)
- city3d: lat,lon, buildings(8-24), spread(2-8 degrees)
- cloud3d: lat,lon, alt(20-50), size(2-6), w(4-12), h(2-5), fill(hex)
- volcano3d: lat,lon, fill(hex), baseColor(hex), width(10-25), height(15-35), erupting(bool)
- ring3d: innerR(1.2-1.6), outerR(1.7-2.2), fill(hex like #c8a050)
- moon3d: r(15-35), dist(2.5-5), speed(0.3-1.5), angle(0-6.28), elevation(-30 to 30)
- sphere3d: lat,lon, alt, r(3-20), fill(hex), roughness(0-1), metalness(0-1), emissive(hex), emissiveIntensity(0-3)
- box3d: lat,lon, alt, w,h,d (5-20 each), fill(hex)
- ice3d: lat,lon — adds ice caps
- light3d: lat,lon, alt(10-50), color(hex), intensity(1-5), distance(100-500)

COORDINATE SYSTEM:
- lat: -90 to 90 (90=north pole, -90=south pole, 0=equator)
- lon: -180 to 180 (0=front, 90=right side, 180/-180=back, -90=left)
- alt: units above surface (0=surface, 100=far above)

SCENE-BUILDING RULES:
- Vary lat/lon to spread things around the ENTIRE planet, not just one spot
- For forests: use 3-5 forest3d at different lat/lon (e.g. lat:30,lon:20; lat:-20,lon:100; lat:10,lon:-60)
- For oceans: use 1-2 ocean3d covering large areas
- For mountain ranges: use 4-8 mountain3d spread across a region  
- Generate 4-12 objects per request
- For chemistry: mention electron gangsta for F,O,N,Cl`

:`You are Keith GPT, God of a 2D world called "${gName}".
RESPOND ONLY with valid JSON (no markdown):
{"speech":"Keith 1-2 sentence response","objects":[...]}
2D TYPES (x,y=0-1 centre, w,h,r=0-1 fraction of canvas):
house:x,y,w,h,fill,roofColor  tree:x,y,w,h,fill,trunkColor  mountain:x,y,w,h,fill,peakColor
ocean:x,y,w,h,fill  lake:x,y,w,h,fill  forest:x,y,w,h,fill,count(4-10)
cloud:x,y,w,h  sun:x,y,r  grass:x,y,w,h,fill  road:x,y,w,h  building:x,y,w,h,fill,cols,rows
volcano:x,y,w,h,fill  island:x,y,w,h  fire:x,y,r  rainbow:x,y,w,h  river:x,y,w,h
atom:x,y,r,orbits  circle:x,y,r,fill,stroke,glow  rect:x,y,w,h,fill,stroke,radius
text:x,y,text,fontSize(0.02-0.1),color  compound:x,y,children:[]
Rules: generate 6-12 objects, always start with a background rect (x:0.5,y:0.5,w:1,h:1), use realistic colors`;

    const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:sys},...history,{role:'user',content:prompt}],max_tokens:2200,temperature:0.85})});
    if(!res.ok)throw new Error('API '+res.status);
    const data=await res.json();
    const raw=data.choices[0].message.content.trim().replace(/```json|```/g,'').trim();
    const s2=raw.indexOf('{'),e2=raw.lastIndexOf('}');
    const parsed=JSON.parse(raw.slice(s2,e2+1));
    const speech=parsed.speech||'My man, it is done.';
    const objs=parsed.objects||[];
    objs.forEach(o=>{gScene.push(o);if(gDim==='3d')applyObj3D(o);});
    if(gDim==='2d')draw2D();
    addMsg(speech,'k');gChat.push({r:'k',c:speech});
    speak(speech);setStat('✓ Created!');
  }catch(e){console.error(e);addMsg('My man, I had trouble with that. Try describing it differently.','k');setStat('Error — try again');}
  gSending=false;document.getElementById('g-send').disabled=false;document.getElementById('g-think').classList.remove('on');
  setTimeout(()=>setStat(''),3000);
}

function addMsg(t,r){const ch=document.getElementById('g-chat'),d=document.createElement('div');d.className='gm '+r;d.textContent=(r==='k'?'Keith: ':'You: ')+t;ch.appendChild(d);ch.scrollTop=ch.scrollHeight;}
function setStat(m){document.getElementById('g-stat').textContent=m;}
function speak(t){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);const v=window.speechSynthesis.getVoices();const p=v.find(x=>x.name.includes('Alex')||x.lang.startsWith('en'))||null;if(p)u.voice=p;u.rate=0.78;u.pitch=0.85;u.volume=1;window.speechSynthesis.speak(u);}
window.speechSynthesis&&(window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices());
function saveWorld(){const d=getSW();d[gKey]={name:gName,dim:gDim,scene:gScene,chat:gChat,ts:Date.now()};setSW(d);addMsg('World saved!','k');setStat('✓ Saved');setTimeout(()=>setStat(''),2000);}
function goBack(){window.location.href='index.html';}
</script>
